# ============================================================
# Continuous Deployment Pipeline
# Builds Docker images, pushes to GHCR, then:
#   1. Updates K8s manifests (image tags)
#   2. Deploys to K8s via Argo Rollouts (progressive canary)
# ============================================================
name: CD

on:
  push:
    branches: [main]

concurrency:
  group: cd-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  BACKEND_IMAGE: ghcr.io/${{ github.repository_owner }}/hire-adda-backend
  FRONTEND_IMAGE: ghcr.io/${{ github.repository_owner }}/hire-adda-frontend

jobs:
  # ── Detect which services changed ──
  changes:
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
      infra: ${{ steps.filter.outputs.infra }}
    steps:
      - uses: actions/checkout@v6
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            backend:
              - 'backend/src/**'
              - 'backend/package*.json'
              - 'backend/prisma/**'
              - 'backend/prisma.config.*'
              - 'infra/docker/backend.Dockerfile'
            frontend:
              - 'frontend/src/**'
              - 'frontend/package*.json'
              - 'frontend/next.config.*'
              - 'frontend/public/**'
              - 'infra/docker/frontend.Dockerfile'
            infra:
              - 'infra/**'
              - '.github/workflows/**'

  # ── Build & Push Backend Image ──
  build-backend:
    needs: changes
    if: needs.changes.outputs.backend == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6

      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push backend
        uses: docker/build-push-action@v7
        with:
          context: ./backend
          file: ./infra/docker/backend.Dockerfile
          push: true
          tags: |
            ${{ env.BACKEND_IMAGE }}:${{ github.sha }}
            ${{ env.BACKEND_IMAGE }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          secrets: |
            SENTRY_AUTH_TOKEN=${{ secrets.SENTRY_AUTH_TOKEN }}

  # ── Build & Push Frontend Image ──
  build-frontend:
    needs: changes
    if: needs.changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6

      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push frontend
        uses: docker/build-push-action@v7
        with:
          context: ./frontend
          file: ./infra/docker/frontend.Dockerfile
          push: true
          tags: |
            ${{ env.FRONTEND_IMAGE }}:${{ github.sha }}
            ${{ env.FRONTEND_IMAGE }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            NEXT_PUBLIC_API_URL=https://api.hireadda.in/api/v1
            NEXT_PUBLIC_SOCKET_URL=https://api.hireadda.in
            NEXT_PUBLIC_APP_URL=https://hireadda.in
            NEXT_PUBLIC_SUPPORT_EMAIL=support@hireadda.in
            NEXT_PUBLIC_GOOGLE_CLIENT_ID=${{ secrets.NEXT_PUBLIC_GOOGLE_CLIENT_ID }}
            NEXT_PUBLIC_LINKEDIN_CLIENT_ID=${{ secrets.NEXT_PUBLIC_LINKEDIN_CLIENT_ID }}
            NEXT_PUBLIC_WEBAUTHN_RP_ID=hireadda.in
            NEXT_PUBLIC_FIREBASE_API_KEY=${{ secrets.NEXT_PUBLIC_FIREBASE_API_KEY }}
            NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN=${{ secrets.NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN }}
            NEXT_PUBLIC_FIREBASE_PROJECT_ID=${{ secrets.NEXT_PUBLIC_FIREBASE_PROJECT_ID }}
            NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET=${{ secrets.NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET }}
            NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID=${{ secrets.NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID }}
            NEXT_PUBLIC_FIREBASE_APP_ID=${{ secrets.NEXT_PUBLIC_FIREBASE_APP_ID }}
            NEXT_PUBLIC_FIREBASE_MEASUREMENT_ID=${{ secrets.NEXT_PUBLIC_FIREBASE_MEASUREMENT_ID }}
            NEXT_PUBLIC_FIREBASE_DATABASE_URL=${{ secrets.NEXT_PUBLIC_FIREBASE_DATABASE_URL }}
            NEXT_PUBLIC_FIREBASE_VAPID_KEY=${{ secrets.NEXT_PUBLIC_FIREBASE_VAPID_KEY }}
            NEXT_PUBLIC_GA_ID=${{ secrets.NEXT_PUBLIC_GA_ID }}
            NEXT_PUBLIC_GTM_ID=${{ secrets.NEXT_PUBLIC_GTM_ID }}
            NEXT_PUBLIC_FB_PIXEL_ID=${{ secrets.NEXT_PUBLIC_FB_PIXEL_ID }}
            NEXT_PUBLIC_TURNSTILE_SITE_KEY=${{ secrets.NEXT_PUBLIC_TURNSTILE_SITE_KEY }}
            NEXT_PUBLIC_SENTRY_DSN=${{ secrets.NEXT_PUBLIC_SENTRY_DSN }}
            NEXT_PUBLIC_ENABLE_MOCK_DATA=false
            NEXT_PUBLIC_MAINTENANCE_MODE=false
            NEXT_PUBLIC_CLOUDINARY_CLOUD_NAME=${{ secrets.NEXT_PUBLIC_CLOUDINARY_CLOUD_NAME }}
            NEXT_PUBLIC_R2_PUBLIC_URL=${{ secrets.NEXT_PUBLIC_R2_PUBLIC_URL }}
            NEXT_PUBLIC_VAPID_PUBLIC_KEY=${{ secrets.NEXT_PUBLIC_VAPID_PUBLIC_KEY }}
            NEXT_PUBLIC_NOMINATIM_BASE_URL=https://nominatim.openstreetmap.org
            NEXT_PUBLIC_RAZORPAY_KEY_ID=${{ secrets.NEXT_PUBLIC_RAZORPAY_KEY_ID }}
          secrets: |
            SENTRY_AUTH_TOKEN=${{ secrets.SENTRY_AUTH_TOKEN }}

  # ── Update K8s Manifests (triggers ArgoCD sync) ──
  update-manifests:
    needs: [build-backend, build-frontend]
    if: always() && (needs.build-backend.result == 'success' || needs.build-frontend.result == 'success')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Update backend image tag
        if: needs.build-backend.result == 'success'
        run: |
          # Update Rollout in apps/ (ArgoCD source of truth)
          sed -i "s|image: ${{ env.BACKEND_IMAGE }}:.*|image: ${{ env.BACKEND_IMAGE }}:${{ github.sha }}|g" \
            infra/k8s/apps/backend/deployment.yaml
          # Update Rollout variants in cd/ (used by deploy-k8s.sh for strategy switching)
          sed -i "s|image: ${{ env.BACKEND_IMAGE }}:.*|image: ${{ env.BACKEND_IMAGE }}:${{ github.sha }}|g" \
            infra/k8s/cd/rollout.yaml
          sed -i "s|image: ${{ env.BACKEND_IMAGE }}:.*|image: ${{ env.BACKEND_IMAGE }}:${{ github.sha }}|g" \
            infra/k8s/cd/rollout-bluegreen.yaml

      - name: Update frontend image tag
        if: needs.build-frontend.result == 'success'
        run: |
          # Update Rollout in apps/ (ArgoCD source of truth)
          sed -i "s|image: ${{ env.FRONTEND_IMAGE }}:.*|image: ${{ env.FRONTEND_IMAGE }}:${{ github.sha }}|g" \
            infra/k8s/apps/frontend/deployment.yaml
          # Update Rollout variants in cd/ (used by deploy-k8s.sh for strategy switching)
          sed -i "s|image: ${{ env.FRONTEND_IMAGE }}:.*|image: ${{ env.FRONTEND_IMAGE }}:${{ github.sha }}|g" \
            infra/k8s/cd/frontend-rollout.yaml
          sed -i "s|image: ${{ env.FRONTEND_IMAGE }}:.*|image: ${{ env.FRONTEND_IMAGE }}:${{ github.sha }}|g" \
            infra/k8s/cd/frontend-rollout-bluegreen.yaml

      - name: Commit and push manifest updates
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add infra/k8s/
          git diff --cached --quiet && echo "No changes to commit" && exit 0
          git commit -m "chore(cd): update image tags to ${{ github.sha }}"
          # Pull any commits pushed since checkout (e.g. by concurrent CD runs)
          git pull --rebase
          git push

  # ── Deploy to K8s via Argo Rollouts (Progressive) ──
  # NOTE: Only deploy a service if it actually built a new image.
  # Infra-only changes are synced via rsync and applied by ensure_required_resources()
  # in deploy-k8s.sh — no image tag override needed. Deploying with 'latest' tag
  # causes build-ID mismatches across pods (chunk 404 errors for Next.js frontends).
  deploy-k8s:
    needs: [changes, build-backend, build-frontend, update-manifests]
    if: always() && (needs.build-backend.result == 'success' || needs.build-frontend.result == 'success' || needs.changes.outputs.infra == 'true')
    uses: ./.github/workflows/deploy-k8s.yml
    with:
      backend_tag: ${{ needs.build-backend.result == 'success' && github.sha || '' }}
      frontend_tag: ${{ needs.build-frontend.result == 'success' && github.sha || '' }}
      deploy_backend: ${{ needs.build-backend.result == 'success' }}
      deploy_frontend: ${{ needs.build-frontend.result == 'success' }}
      strategy: progressive
    secrets:
      K8S_SSH_KEY: ${{ secrets.K8S_SSH_KEY }}
      K8S_HOST: ${{ secrets.K8S_HOST }}
      K8S_USER: ${{ secrets.K8S_USER }}
      K8S_DEPLOY_PATH: ${{ secrets.K8S_DEPLOY_PATH }}
      GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
