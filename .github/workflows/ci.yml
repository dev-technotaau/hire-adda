name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─── Backend ───────────────────────────────────────────
  backend:
    name: Backend
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20.x, 22.x]

    steps:
      - uses: actions/checkout@v6

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        working-directory: ./backend
        run: npm ci

      - name: Lint
        working-directory: ./backend
        run: npm run lint

      - name: Type check
        working-directory: ./backend
        run: npm run type-check

      - name: Tests
        working-directory: ./backend
        run: npm test
        env:
          NODE_ENV: test
          DATABASE_URL: postgresql://test:test@localhost:5432/test_db
          COOKIE_SECRET: ci-test-cookie-secret-minimum-32-chars
          CSRF_SECRET: ci-test-csrf-secret-minimum-32-chars!!
          JWT_SECRET: ci-test-jwt-secret-minimum-32-characters
          JWT_REFRESH_SECRET: ci-test-jwt-refresh-secret-min-32-chars
          JWT_ALGORITHM: HS256
          REDIS_ENABLED: 'false'

      - name: Build
        working-directory: ./backend
        run: npm run build
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}

  # ─── Frontend ──────────────────────────────────────────
  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20.x, 22.x]

    steps:
      - uses: actions/checkout@v6

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: ./frontend
        run: npm ci

      - name: Lint
        working-directory: ./frontend
        run: npm run lint

      - name: Type check
        working-directory: ./frontend
        run: npm run type-check

      - name: Tests
        working-directory: ./frontend
        run: npm test -- --ci --passWithNoTests
        env:
          NODE_ENV: test

      - name: Build
        working-directory: ./frontend
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:5000/api/v1
          NEXT_PUBLIC_SOCKET_URL: http://localhost:5000
          NEXT_PUBLIC_APP_URL: http://localhost:3000
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}

  # ─── Security Audit ────────────────────────────────────
  security:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Use Node.js 20.x
        uses: actions/setup-node@v4
        with:
          node-version: 20.x

      - name: Audit backend
        working-directory: ./backend
        run: npm audit --audit-level=critical || true

      - name: Audit frontend
        working-directory: ./frontend
        run: npm audit --audit-level=critical || true

  # ─── Container Security ────────────────────────────────
  container-security:
    name: Container Security Scan
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v6

      - name: Build backend image
        run: docker build -f ./infra/docker/backend.Dockerfile -t hire-adda-backend:scan ./backend

      - name: Scan backend image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: hire-adda-backend:scan
          format: table
          exit-code: 0
          severity: CRITICAL,HIGH

      - name: Build frontend image
        run: docker build -f ./infra/docker/frontend.Dockerfile -t hire-adda-frontend:scan ./frontend

      - name: Scan frontend image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: hire-adda-frontend:scan
          format: table
          exit-code: 0
          severity: CRITICAL,HIGH

  # ─── Commitlint ────────────────────────────────────────
  commitlint:
    name: Commit Lint
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Use Node.js 20.x
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: npm

      - name: Install commitlint
        run: npm ci

      - name: Validate PR commits
        run: npx commitlint --from ${{ github.event.pull_request.base.sha }} --to ${{ github.event.pull_request.head.sha }}
