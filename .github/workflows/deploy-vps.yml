# ============================================================
# VPS Docker Compose Deployment (Progressive / Blue-Green / Canary / Rolling)
# Reusable workflow (called from cd.yml) + manual trigger
# SSHes into VPS, syncs configs, runs deploy.sh with strategy
# ============================================================
name: Deploy to VPS

on:
  workflow_dispatch:
    inputs:
      action:
        description: 'Deploy action'
        required: false
        default: 'deploy'
        type: choice
        options:
          - deploy
          - promote
          - rollback
          - status
      strategy:
        description: 'Deploy strategy (only for deploy action)'
        required: false
        default: 'progressive'
        type: choice
        options:
          - progressive
          - blue-green
          - canary
          - rolling
      service:
        description: 'Service to deploy'
        required: false
        default: 'both'
        type: choice
        options:
          - both
          - backend
          - frontend
      backend_tag:
        description: 'Backend image tag (default: latest)'
        required: false
        default: 'latest'
        type: string
      frontend_tag:
        description: 'Frontend image tag (default: latest)'
        required: false
        default: 'latest'
        type: string
      canary_weight:
        description: 'Canary traffic weight % (only for canary strategy)'
        required: false
        default: '20'
        type: string
      skip_migrations:
        description: 'Skip Prisma migrations'
        required: false
        default: false
        type: boolean
      dry_run:
        description: 'Dry run (show what would happen)'
        required: false
        default: false
        type: boolean

  workflow_call:
    inputs:
      backend_tag:
        required: false
        type: string
        default: 'latest'
      frontend_tag:
        required: false
        type: string
        default: 'latest'
      deploy_backend:
        required: false
        type: boolean
        default: false
      deploy_frontend:
        required: false
        type: boolean
        default: false
      strategy:
        required: false
        type: string
        default: 'progressive'
    secrets:
      VPS_SSH_KEY:
        required: true
      VPS_HOST:
        required: true
      VPS_USER:
        required: true
      VPS_DEPLOY_PATH:
        required: true
      GHCR_TOKEN:
        required: true

concurrency:
  group: deploy-vps
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: read
      packages: read
    steps:
      - uses: actions/checkout@v6

      - name: Determine deploy parameters
        id: plan
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            # Manual trigger
            ACTION="${{ inputs.action }}"
            STRATEGY="${{ inputs.strategy }}"
            SERVICE="${{ inputs.service }}"
            BACKEND_TAG="${{ inputs.backend_tag }}"
            FRONTEND_TAG="${{ inputs.frontend_tag }}"
            CANARY_WEIGHT="${{ inputs.canary_weight }}"
            SKIP_MIGRATIONS="${{ inputs.skip_migrations }}"
            DRY_RUN="${{ inputs.dry_run }}"

            echo "action=${ACTION}" >> "$GITHUB_OUTPUT"
            echo "strategy=${STRATEGY}" >> "$GITHUB_OUTPUT"
            echo "canary_weight=${CANARY_WEIGHT}" >> "$GITHUB_OUTPUT"
            echo "skip_migrations=${SKIP_MIGRATIONS}" >> "$GITHUB_OUTPUT"
            echo "dry_run=${DRY_RUN}" >> "$GITHUB_OUTPUT"

            if [[ "$ACTION" == "deploy" ]]; then
              if [[ "$SERVICE" == "backend" || "$SERVICE" == "both" ]]; then
                echo "deploy_backend=true" >> "$GITHUB_OUTPUT"
              fi
              if [[ "$SERVICE" == "frontend" || "$SERVICE" == "both" ]]; then
                echo "deploy_frontend=true" >> "$GITHUB_OUTPUT"
              fi
            fi

            echo "backend_tag=${BACKEND_TAG}" >> "$GITHUB_OUTPUT"
            echo "frontend_tag=${FRONTEND_TAG}" >> "$GITHUB_OUTPUT"
          else
            # Called from cd.yml
            echo "action=deploy" >> "$GITHUB_OUTPUT"
            echo "strategy=${{ inputs.strategy || 'progressive' }}" >> "$GITHUB_OUTPUT"
            echo "canary_weight=20" >> "$GITHUB_OUTPUT"
            echo "skip_migrations=false" >> "$GITHUB_OUTPUT"
            echo "dry_run=false" >> "$GITHUB_OUTPUT"
            echo "backend_tag=${{ inputs.backend_tag }}" >> "$GITHUB_OUTPUT"
            echo "frontend_tag=${{ inputs.frontend_tag }}" >> "$GITHUB_OUTPUT"

            if [[ "${{ inputs.deploy_backend }}" == "true" ]]; then
              echo "deploy_backend=true" >> "$GITHUB_OUTPUT"
            fi
            if [[ "${{ inputs.deploy_frontend }}" == "true" ]]; then
              echo "deploy_frontend=true" >> "$GITHUB_OUTPUT"
            fi
          fi

      - name: Install SSH key
        uses: shimataro/ssh-key-action@v2
        with:
          key: ${{ secrets.VPS_SSH_KEY }}
          name: id_ed25519
          known_hosts: unnecessary
          if_key_exists: replace

      - name: Add VPS to known hosts
        run: |
          for i in 1 2 3; do
            ssh-keyscan -T 10 -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts 2>/dev/null && break
            echo "ssh-keyscan attempt $i failed, retrying in 5s..."
            sleep 5
          done

      - name: Sync infra configs to VPS
        if: steps.plan.outputs.action == 'deploy'
        run: |
          rsync -avz --delete \
            --exclude='docker-compose.override.yml' \
            --exclude='.env' \
            --exclude='*.example' \
            --exclude='.deploy-state' \
            --exclude='nginx/conf.d/dev.conf' \
            --exclude='mail/.env' \
            --exclude='mail/docker-compose.yml' \
            --exclude='mail/setup.sh' \
            --exclude='mail/test.sh' \
            --exclude='mail/DNS-RECORDS.md' \
            --exclude='mail/.gitignore' \
            --exclude='mail/roundcube-custom.php' \
            --exclude='mail/webmail-nginx.conf' \
            -e "ssh -i ~/.ssh/id_ed25519 -o IdentitiesOnly=yes -o StrictHostKeyChecking=no" \
            ./infra/ \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:${{ secrets.VPS_DEPLOY_PATH }}/infra/

      - name: Login to GHCR on VPS
        if: steps.plan.outputs.action == 'deploy'
        env:
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN || secrets.GITHUB_TOKEN }}
        run: |
          ssh -i ~/.ssh/id_ed25519 -o IdentitiesOnly=yes -o StrictHostKeyChecking=no \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} \
            "echo '${GHCR_TOKEN}' | docker login ghcr.io -u ${{ github.actor }} --password-stdin"

      - name: Run deploy
        id: deploy
        run: |
          ACTION="${{ steps.plan.outputs.action }}"
          DEPLOY_ARGS=""

          case "$ACTION" in
            deploy)
              DEPLOY_ARGS="--strategy ${{ steps.plan.outputs.strategy }}"

              if [[ "${{ steps.plan.outputs.deploy_backend }}" == "true" ]]; then
                DEPLOY_ARGS+=" --backend-tag ${{ steps.plan.outputs.backend_tag }}"
              fi
              if [[ "${{ steps.plan.outputs.deploy_frontend }}" == "true" ]]; then
                DEPLOY_ARGS+=" --frontend-tag ${{ steps.plan.outputs.frontend_tag }}"
              fi
              if [[ "${{ steps.plan.outputs.strategy }}" == "canary" ]]; then
                DEPLOY_ARGS+=" --canary-weight ${{ steps.plan.outputs.canary_weight }}"
              fi
              if [[ "${{ steps.plan.outputs.skip_migrations }}" == "true" ]]; then
                DEPLOY_ARGS+=" --skip-migrations"
              fi
              if [[ "${{ steps.plan.outputs.dry_run }}" == "true" ]]; then
                DEPLOY_ARGS+=" --dry-run"
              fi
              ;;
            promote)
              DEPLOY_ARGS="--promote"
              ;;
            rollback)
              DEPLOY_ARGS="--rollback"
              ;;
            status)
              DEPLOY_ARGS="--status"
              ;;
          esac

          ssh -i ~/.ssh/id_ed25519 -o IdentitiesOnly=yes -o StrictHostKeyChecking=no \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} \
            "cd ${{ secrets.VPS_DEPLOY_PATH }}/infra/docker && \
             bash ${{ secrets.VPS_DEPLOY_PATH }}/infra/scripts/deploy.sh ${DEPLOY_ARGS}"

      - name: Verify deployment externally
        if: steps.plan.outputs.dry_run != 'true' && steps.plan.outputs.action != 'status'
        run: |
          sleep 10
          echo "Checking external endpoints..."

          check_endpoint() {
            local name="$1"
            local url="$2"
            STATUS=$(curl -sf -o /dev/null -w "%{http_code}" --max-time 15 "$url" 2>/dev/null || echo "000")
            if [[ "$STATUS" == "200" || "$STATUS" == "301" || "$STATUS" == "302" ]]; then
              echo "  $name: OK ($STATUS)"
            else
              echo "  $name: WARNING ($STATUS)" >&2
            fi
          }

          check_endpoint "Backend Health" "https://api.hireadda.in/health"
          check_endpoint "Frontend" "https://hireadda.in"

      - name: Deploy summary
        if: always()
        run: |
          echo "## VPS Deploy Summary" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Property | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "|----------|-------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Action | ${{ steps.plan.outputs.action }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Strategy | ${{ steps.plan.outputs.strategy || 'n/a' }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Backend Tag | ${{ steps.plan.outputs.deploy_backend == 'true' && steps.plan.outputs.backend_tag || 'skipped' }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Frontend Tag | ${{ steps.plan.outputs.deploy_frontend == 'true' && steps.plan.outputs.frontend_tag || 'skipped' }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Canary Weight | ${{ steps.plan.outputs.strategy == 'canary' && steps.plan.outputs.canary_weight || 'n/a' }}% |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Migrations | ${{ steps.plan.outputs.skip_migrations == 'true' && 'skipped' || 'ran' }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Dry Run | ${{ steps.plan.outputs.dry_run }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Status | ${{ steps.deploy.outcome }} |" >> "$GITHUB_STEP_SUMMARY"
