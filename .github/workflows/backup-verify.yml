name: Backup Scripts Verification

on:
  schedule:
    - cron: '0 6 * * 1' # Weekly on Monday at 6 AM UTC
  push:
    paths:
      - 'infra/scripts/**'
      - '.github/workflows/backup-verify.yml'
  pull_request:
    paths:
      - 'infra/scripts/**'

jobs:
  verify-scripts:
    name: Verify Backup Scripts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Check script syntax (bash -n)
        run: |
          echo "Checking shell script syntax..."
          for script in infra/scripts/*.sh; do
            echo "  Checking: $script"
            bash -n "$script"
          done
          echo "All scripts passed syntax check."

      - name: Verify scripts are executable-ready
        run: |
          echo "Verifying script headers..."
          for script in infra/scripts/*.sh; do
            if ! head -1 "$script" | grep -q '#!/usr/bin/env bash\|#!/bin/bash'; then
              echo "ERROR: $script missing bash shebang"
              exit 1
            fi
          done
          echo "All scripts have valid shebangs."

      - name: Verify Makefile backup targets exist
        run: |
          echo "Checking Makefile backup targets..."
          TARGETS="backup-db backup-db-restore backup-cleanup backup-status"
          for target in $TARGETS; do
            if ! grep -q "^${target}:" Makefile; then
              echo "ERROR: Missing Makefile target: $target"
              exit 1
            fi
          done
          echo "All backup Makefile targets present."
