version: '3.8'

# Development Docker Compose - No SSL, simpler setup

services:
  # Frontend with hot reload
  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile.dev
    container_name: talentbridge_frontend_dev
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
      - NEXT_PUBLIC_API_URL=http://localhost:5000/api/v1
    volumes:
      - ../frontend:/app
      - /app/node_modules
      - /app/.next
    networks:
      - talentbridge_network

  # Nginx (optional for dev, can hit backend directly)
  nginx:
    image: nginx:alpine
    container_name: talentbridge_nginx_dev
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d/dev.conf:/etc/nginx/conf.d/default.conf:ro
      - uploads_data:/var/www/uploads:ro
    depends_on:
      - backend
    networks:
      - talentbridge_network

  # Backend with hot reload
  backend:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: talentbridge_backend_dev
    ports:
      - "5000:5000"
    environment:
      - NODE_ENV=development
      - PORT=5000
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/talentbridge?schema=public
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - JWT_SECRET=dev-secret-key-min-32-characters-long
      - JWT_REFRESH_SECRET=dev-refresh-secret-min-32-chars
    volumes:
      - .:/app
      - /app/node_modules
      - uploads_data:/app/uploads
    depends_on:
      - postgres
      - redis
    networks:
      - talentbridge_network

  # PostgreSQL
  postgres:
    image: postgres:16-alpine
    container_name: talentbridge_postgres_dev
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=talentbridge
    volumes:
      - postgres_data_dev:/var/lib/postgresql/data
    networks:
      - talentbridge_network

  # Redis
  redis:
    image: redis:7-alpine
    container_name: talentbridge_redis_dev
    ports:
      - "6379:6379"
    networks:
      - talentbridge_network

networks:
  talentbridge_network:
    driver: bridge

volumes:
  postgres_data_dev:
  uploads_data:
