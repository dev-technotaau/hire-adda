# Talent Bridge API Server Configuration
# Reverse proxy to Node.js backend

# Upstream for load balancing (can add multiple backend servers)
upstream backend_api {
    least_conn;
    server backend:5000 weight=1 max_fails=3 fail_timeout=30s;
    # Add more servers for load balancing:
    # server backend2:5000 weight=1;
    keepalive 32;
}

upstream frontend_app {
    server frontend:3000;
    keepalive 16;
}

# Redirect HTTP to HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name talentbridge.com www.talentbridge.com api.talentbridge.com;

    # Allow Let's Encrypt ACME challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Redirect all other traffic to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS Server - API (api.talentbridge.com)
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name api.talentbridge.com;

    # SSL Configuration
    ssl_certificate /etc/nginx/ssl/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/privkey.pem;
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:50m;
    ssl_session_tickets off;

    # Modern SSL configuration
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;

    # HSTS
    add_header Strict-Transport-Security "max-age=63072000" always;

    # Request size limits
    client_max_body_size 10M;
    client_body_buffer_size 128k;

    # Proxy headers
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host $host;
    proxy_set_header X-Forwarded-Port $server_port;

    # WebSocket support
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";

    # Timeouts
    proxy_connect_timeout 60s;
    proxy_send_timeout 60s;
    proxy_read_timeout 60s;

    # Health check endpoint (no rate limiting)
    location /health {
        proxy_pass http://backend_api;
    }

    # API documentation
    location /api-docs {
        proxy_pass http://backend_api;
    }

    # Rate limited API endpoints
    location /api/auth/login {
        limit_req zone=login burst=5 nodelay;
        limit_conn conn_limit 5;
        proxy_pass http://backend_api;
    }

    location /api/auth/register {
        limit_req zone=login burst=3 nodelay;
        limit_conn conn_limit 3;
        proxy_pass http://backend_api;
    }

    # General API routes
    location /api {
        limit_req zone=api burst=20 nodelay;
        limit_conn conn_limit 20;
        proxy_pass http://backend_api;
    }

    # Static file uploads
    location /uploads {
        alias /var/www/uploads;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # Default - proxy to backend
    location / {
        proxy_pass http://backend_api;
    }

    # Error pages
    error_page 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
        internal;
    }
}

# HTTPS Server - Frontend (talentbridge.com)
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name talentbridge.com www.talentbridge.com;

    # SSL Configuration (same as API)
    ssl_certificate /etc/nginx/ssl/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/privkey.pem;
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:50m;
    ssl_protocols TLSv1.2 TLSv1.3;

    # HSTS
    add_header Strict-Transport-Security "max-age=63072000" always;

    # Proxy to Next.js frontend
    location / {
        proxy_pass http://frontend_app;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Next.js static files
    location /_next/static {
        proxy_pass http://frontend_app;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
