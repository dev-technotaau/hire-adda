upstream talent_bridge_frontend {
    server frontend:3000;
}

upstream talent_bridge_backend {
    server app:5000;
}

server {
    listen 80;
    server_name api.talentbridge.com localhost;

    # Default body size limit (matches Express 10KB)
    client_max_body_size 10k;

    # Frontend
    location / {
        proxy_pass http://talent_bridge_frontend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Backend API
    location /api {
        proxy_pass http://talent_bridge_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # File uploads (larger body size limit)
    location ~ ^/api/v1/(candidates/resume|employers/logo) {
        client_max_body_size 5m;
        proxy_pass http://talent_bridge_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # API Documentation
    location /api-docs {
        proxy_pass http://talent_bridge_backend/api-docs;
        proxy_set_header Host $host;
    }

    # Socket.io
    location /socket.io/ {
        proxy_pass http://talent_bridge_backend/socket.io/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
    }
}
