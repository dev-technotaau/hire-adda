version: '3.8'

services:
  # ===========================================
  # Nginx Reverse Proxy
  # ===========================================
  nginx:
    image: nginx:1.27-alpine
    container_name: talentbridge_nginx
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.5'
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - uploads_data:/var/www/uploads:ro
      - ./nginx/certbot:/var/www/certbot:ro
    depends_on:
      - backend
      - frontend
    networks:
      - talentbridge_network
    healthcheck:
      test: [ "CMD", "nginx", "-t" ]
      interval: 30s
      timeout: 10s
      retries: 3

  # ===========================================
  # Frontend (Next.js)
  # ===========================================
  frontend:
    container_name: talentbridge_frontend
    build:
      context: ../frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '1.0'
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_URL=https://api.talentbridge.com/api/v1
    networks:
      - talentbridge_network

  # ===========================================
  # Node.js Backend API
  # ===========================================
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: talentbridge_backend
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '1.0'
    environment:
      - NODE_ENV=production
      - PORT=5000
      - DATABASE_URL=postgresql://postgres:${POSTGRES_PASSWORD}@postgres:5432/talentbridge?schema=public
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - JWT_SECRET=${JWT_SECRET}
      - JWT_REFRESH_SECRET=${JWT_REFRESH_SECRET}
      - SENTRY_DSN=${SENTRY_DSN}
    volumes:
      - uploads_data:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - talentbridge_network
    healthcheck:
      test: [ "CMD", "node", "-e", "require('http').get('http://localhost:5000/health', (r) => process.exit(r.statusCode === 200 ? 0 : 1))" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # ===========================================
  # PostgreSQL Database
  # NOTE: This is for local development only.
  # In production, use a managed PostgreSQL service (e.g., AWS RDS, GCP Cloud SQL, Azure Database).
  # ===========================================
  postgres:
    image: postgres:16-alpine
    container_name: talentbridge_postgres
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '1.0'
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=talentbridge
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - talentbridge_network
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres -d talentbridge" ]
      interval: 10s
      timeout: 5s
      retries: 5

  # ===========================================
  # OpenSearch (Search Engine)
  # ===========================================
  opensearch:
    image: opensearchproject/opensearch:2.18.0
    container_name: talentbridge_opensearch
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: '1.0'
    environment:
      - cluster.name=talentbridge
      - node.name=opensearch-node1
      - discovery.type=single-node
      - OPENSEARCH_JAVA_OPTS=-Xms1g -Xmx1g
      - DISABLE_SECURITY_PLUGIN=true
      - DISABLE_INSTALL_DEMO_CONFIG=true
      - path.repo=/usr/share/opensearch/snapshots
    ports:
      - "9200:9200"
    volumes:
      - opensearch_data:/usr/share/opensearch/data
      - opensearch_snapshots:/usr/share/opensearch/snapshots
    networks:
      - talentbridge_network
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9200/_cluster/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5

  # ===========================================
  # Redis Cache & Job Queue
  # ===========================================
  redis:
    image: redis:7-alpine
    container_name: talentbridge_redis
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    networks:
      - talentbridge_network
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5

# ===========================================
# Networks
# ===========================================
networks:
  talentbridge_network:
    driver: bridge

# ===========================================
# Volumes
# ===========================================
volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  opensearch_data:
    driver: local
  opensearch_snapshots:
    driver: local
  uploads_data:
    driver: local
