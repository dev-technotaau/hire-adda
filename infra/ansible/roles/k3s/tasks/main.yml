# ============================================================
# K3s Role — Installation and configuration tasks
# These tasks can be included via `roles: [k3s]` or
# are currently executed inline in 02-k3s-install.yml
# ============================================================

---
# ── K3s Installation ──
- name: Check if K3s is already installed
  ansible.builtin.stat:
    path: /usr/local/bin/k3s
  register: k3s_binary

- name: Download K3s install script
  ansible.builtin.get_url:
    url: https://get.k3s.io
    dest: /tmp/k3s-install.sh
    mode: '0755'
  when: not k3s_binary.stat.exists

- name: Create K3s config directory
  ansible.builtin.file:
    path: /etc/rancher/k3s
    state: directory
    mode: '0755'

- name: Deploy K3s server configuration
  ansible.builtin.template:
    src: k3s-config.yaml.j2
    dest: /etc/rancher/k3s/config.yaml
    mode: '0644'
  notify: restart k3s

- name: Install K3s
  ansible.builtin.shell: |
    INSTALL_K3S_VERSION="{{ k3s_version }}" sh /tmp/k3s-install.sh
  args:
    creates: /usr/local/bin/k3s
  environment:
    INSTALL_K3S_EXEC: 'server'

- name: Wait for K3s to be ready
  ansible.builtin.command:
    cmd: kubectl wait --for=condition=Ready node --all --timeout=120s
  retries: 5
  delay: 10
  register: k3s_ready
  until: k3s_ready.rc == 0
  changed_when: false

# ── Kubeconfig for deploy user ──
- name: Create .kube directory for deploy user
  ansible.builtin.file:
    path: '/home/{{ deploy_user }}/.kube'
    state: directory
    owner: '{{ deploy_user }}'
    group: '{{ deploy_group }}'
    mode: '0750'

- name: Copy kubeconfig for deploy user
  ansible.builtin.copy:
    src: /etc/rancher/k3s/k3s.yaml
    dest: '/home/{{ deploy_user }}/.kube/config'
    remote_src: true
    owner: '{{ deploy_user }}'
    group: '{{ deploy_group }}'
    mode: '0600'

- name: Fix kubeconfig server address
  ansible.builtin.replace:
    path: '/home/{{ deploy_user }}/.kube/config'
    regexp: 'https://127.0.0.1:6443'
    replace: 'https://{{ ansible_host }}:6443'

# ── Helm Installation ──
- name: Check if Helm is installed
  ansible.builtin.stat:
    path: /usr/local/bin/helm
  register: helm_binary

- name: Download Helm install script
  ansible.builtin.get_url:
    url: https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3
    dest: /tmp/get-helm.sh
    mode: '0755'
  when: not helm_binary.stat.exists

- name: Install Helm 3
  ansible.builtin.command:
    cmd: /tmp/get-helm.sh
  when: not helm_binary.stat.exists
  changed_when: true

# ── Shell Aliases ──
- name: Add kubectl and helm aliases
  ansible.builtin.blockinfile:
    path: '/home/{{ deploy_user }}/.bashrc'
    block: |
      # K3s / Kubernetes aliases
      alias k='kubectl'
      alias kgp='kubectl get pods -n talent-bridge'
      alias kgs='kubectl get svc -n talent-bridge'
      alias kgd='kubectl get deploy -n talent-bridge'
      alias kga='kubectl get all -n talent-bridge'
      alias klb='kubectl logs -f deploy/backend -n talent-bridge'
      alias klf='kubectl logs -f deploy/frontend -n talent-bridge'
      alias kex='kubectl exec -it -n talent-bridge'
      alias h='helm'
      export KUBECONFIG=/home/{{ deploy_user }}/.kube/config
    marker: '# {mark} ANSIBLE MANAGED — K3s aliases'
    owner: '{{ deploy_user }}'
    group: '{{ deploy_group }}'
