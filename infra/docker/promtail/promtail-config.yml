# ============================================================
# Promtail Configuration — Docker Compose log collection
# Ships container logs to Loki with service labels
# ============================================================
server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  # Docker container logs via json-file log driver
  - job_name: docker
    static_configs:
      - targets:
          - localhost
        labels:
          job: docker
          environment: production
          __path__: /var/lib/docker/containers/*/*-json.log

    pipeline_stages:
      # Parse Docker JSON log format
      - docker: {}
      # Extract container name from path
      - regex:
          source: filename
          expression: '/var/lib/docker/containers/(?P<container_id>[a-f0-9]+)/.*'
      # Add container labels
      - labels:
          container_id:
      # Drop empty lines
      - match:
          selector: '{job="docker"}'
          stages:
            - drop:
                expression: '^\s*$'

  # Host syslog
  - job_name: syslog
    static_configs:
      - targets:
          - localhost
        labels:
          job: syslog
          __path__: /var/log/syslog
