# ============================================================
# OpenTelemetry Collector — Fan-out to Tempo + Honeycomb
# Receives traces from backend, forwards to both destinations
# ============================================================

receivers:
  otlp:
    protocols:
      http:
        endpoint: 0.0.0.0:4318
      grpc:
        endpoint: 0.0.0.0:4317

extensions:
  health_check:
    endpoint: 0.0.0.0:13133

processors:
  batch:
    timeout: 5s
    send_batch_size: 1024

exporters:
  # Local Grafana Tempo
  otlphttp/tempo:
    endpoint: http://tempo:4318

  # Honeycomb (set HONEYCOMB_API_KEY env var)
  otlphttp/honeycomb:
    endpoint: https://api.honeycomb.io
    headers:
      x-honeycomb-team: ${env:HONEYCOMB_API_KEY}

service:
  extensions: [health_check]
  pipelines:
    traces:
      receivers: [otlp]
      processors: [batch]
      exporters: [otlphttp/tempo, otlphttp/honeycomb]

  telemetry:
    logs:
      level: warn
    metrics:
      address: 0.0.0.0:8888
