# ============================================================
# Hire Adda — Local Development Overrides
# Automatically loaded by `docker compose up` when present.
# Restores build: directives for backend & frontend (blue) so
# that local source changes are picked up without GHCR images.
# Green services are not needed for local dev.
#
# On VPS this file does NOT exist (excluded from rsync),
# so docker-compose.yml uses image: (pulls from GHCR).
# ============================================================

services:
  frontend-blue:
    build:
      context: ../../frontend
      dockerfile: ../infra/docker/frontend.Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-https://api.hireadda.in/api/v1}
        NEXT_PUBLIC_SOCKET_URL: ${NEXT_PUBLIC_SOCKET_URL:-https://api.hireadda.in}
        NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-https://hireadda.in}
        NEXT_PUBLIC_SUPPORT_EMAIL: ${NEXT_PUBLIC_SUPPORT_EMAIL:-support@hireadda.in}
        NEXT_PUBLIC_FIREBASE_API_KEY: ${NEXT_PUBLIC_FIREBASE_API_KEY:-}
        NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: ${NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN:-}
        NEXT_PUBLIC_FIREBASE_PROJECT_ID: ${NEXT_PUBLIC_FIREBASE_PROJECT_ID:-}
        NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: ${NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET:-}
        NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: ${NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID:-}
        NEXT_PUBLIC_FIREBASE_APP_ID: ${NEXT_PUBLIC_FIREBASE_APP_ID:-}
        NEXT_PUBLIC_FIREBASE_DATABASE_URL: ${NEXT_PUBLIC_FIREBASE_DATABASE_URL:-}
        NEXT_PUBLIC_FIREBASE_VAPID_KEY: ${NEXT_PUBLIC_FIREBASE_VAPID_KEY:-}
        NEXT_PUBLIC_GA_ID: ${NEXT_PUBLIC_GA_ID:-}
        NEXT_PUBLIC_GTM_ID: ${NEXT_PUBLIC_GTM_ID:-}
        NEXT_PUBLIC_FB_PIXEL_ID: ${NEXT_PUBLIC_FB_PIXEL_ID:-}
        NEXT_PUBLIC_CLARITY_ID: ${NEXT_PUBLIC_CLARITY_ID:-}
        NEXT_PUBLIC_CONTENTSQUARE_ID: ${NEXT_PUBLIC_CONTENTSQUARE_ID:-}
        NEXT_PUBLIC_LINKEDIN_PARTNER_ID: ${NEXT_PUBLIC_LINKEDIN_PARTNER_ID:-}
        NEXT_PUBLIC_PINTEREST_TAG_ID: ${NEXT_PUBLIC_PINTEREST_TAG_ID:-}
        NEXT_PUBLIC_REDDIT_PIXEL_ID: ${NEXT_PUBLIC_REDDIT_PIXEL_ID:-}
        NEXT_PUBLIC_TWITTER_PIXEL_ID: ${NEXT_PUBLIC_TWITTER_PIXEL_ID:-}
        NEXT_PUBLIC_TIKTOK_PIXEL_ID: ${NEXT_PUBLIC_TIKTOK_PIXEL_ID:-}
        NEXT_PUBLIC_QUORA_PIXEL_ID: ${NEXT_PUBLIC_QUORA_PIXEL_ID:-}
        NEXT_PUBLIC_BING_UET_TAG_ID: ${NEXT_PUBLIC_BING_UET_TAG_ID:-}
        NEXT_PUBLIC_SNAP_PIXEL_ID: ${NEXT_PUBLIC_SNAP_PIXEL_ID:-}
        NEXT_PUBLIC_POSTHOG_KEY: ${NEXT_PUBLIC_POSTHOG_KEY:-}
        NEXT_PUBLIC_POSTHOG_HOST: ${NEXT_PUBLIC_POSTHOG_HOST:-https://us.i.posthog.com}
        NEXT_PUBLIC_CF_BEACON_TOKEN: ${NEXT_PUBLIC_CF_BEACON_TOKEN:-}
        NEXT_PUBLIC_ADOBE_LAUNCH_URL: ${NEXT_PUBLIC_ADOBE_LAUNCH_URL:-}
        NEXT_PUBLIC_TURNSTILE_SITE_KEY: ${NEXT_PUBLIC_TURNSTILE_SITE_KEY:-}
        SENTRY_AUTH_TOKEN: ${SENTRY_AUTH_TOKEN:-}

  backend-blue:
    build:
      context: ../../backend
      dockerfile: ../infra/docker/backend.Dockerfile
