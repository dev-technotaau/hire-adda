# Backend upstream — managed by deploy.sh (DO NOT EDIT MANUALLY on VPS)
# This file is regenerated during deploys to control blue/green traffic routing.
# Safe default: placeholder server so nginx config test passes before deploy.sh runs.
upstream backend_api {
    least_conn;
    server 127.0.0.1:65535 down;  # No backend containers running yet
    keepalive 32;
}
