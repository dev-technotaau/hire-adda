# HireAdda Production Configuration
# Single nginx handling all domains: hireadda.in, api.hireadda.in, mail.hireadda.in
#
# Upstreams are managed by deploy.sh for blue-green / canary traffic routing.
# DO NOT define upstream blocks here — they are in /etc/nginx/upstreams/*.conf
include /etc/nginx/upstreams/*.conf;

# ─────────────────────────────────────────────
# HTTP → HTTPS redirect (all domains)
# ─────────────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name hireadda.in www.hireadda.in api.hireadda.in mail.hireadda.in grafana.hireadda.in logs.hireadda.in;

    # Let's Encrypt ACME challenge
    # Try certbot webroot first, fall back to K8s nginx-ingress for cert-manager
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
        try_files $uri @k8s_acme;
    }

    location @k8s_acme {
        proxy_pass http://172.20.0.1:30080;
        proxy_set_header Host $host;
    }

    # Redirect all other traffic to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# ─────────────────────────────────────────────
# HTTPS — API (api.hireadda.in)
# ─────────────────────────────────────────────
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name api.hireadda.in;

    # SSL Configuration
    ssl_certificate /etc/letsencrypt/live/hireadda.in/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/hireadda.in/privkey.pem;
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:50m;
    ssl_session_tickets off;

    # Modern SSL configuration
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;

    # HSTS
    add_header Strict-Transport-Security "max-age=63072000" always;

    # Request size limits
    client_max_body_size 10M;
    client_body_buffer_size 128k;

    # Proxy headers
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host $host;
    proxy_set_header X-Forwarded-Port $server_port;

    # WebSocket support
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";

    # Timeouts
    proxy_connect_timeout 60s;
    proxy_send_timeout 60s;
    proxy_read_timeout 60s;

    # Health check endpoint (no rate limiting)
    location /health {
        proxy_pass http://backend_api;
    }

    # API documentation
    location /api-docs {
        proxy_pass http://backend_api;
    }

    # Rate limited auth endpoints
    location /api/auth/login {
        limit_req zone=login burst=10 nodelay;
        limit_conn conn_limit 10;
        proxy_pass http://backend_api;
    }

    location /api/auth/register {
        limit_req zone=login burst=5 nodelay;
        limit_conn conn_limit 5;
        proxy_pass http://backend_api;
    }

    # General API routes
    location /api {
        limit_req zone=api burst=20 nodelay;
        limit_conn conn_limit 20;
        proxy_pass http://backend_api;
    }

    # Static file uploads
    location /uploads {
        alias /var/www/uploads;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # Default — proxy to backend
    location / {
        proxy_pass http://backend_api;
    }

    # Error pages
    error_page 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
        internal;
    }
}

# ─────────────────────────────────────────────
# HTTPS — Frontend (hireadda.in)
# ─────────────────────────────────────────────
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name hireadda.in www.hireadda.in;

    # SSL Configuration (same cert — SAN covers all domains)
    ssl_certificate /etc/letsencrypt/live/hireadda.in/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/hireadda.in/privkey.pem;
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:50m;
    ssl_protocols TLSv1.2 TLSv1.3;

    # HSTS
    add_header Strict-Transport-Security "max-age=63072000" always;

    # Mail client auto-configuration
    location /.well-known/autoconfig/mail/config-v1.1.xml {
        alias /etc/nginx/mail/autoconfig.xml;
        default_type application/xml;
    }

    location /autodiscover/autodiscover.xml {
        alias /etc/nginx/mail/autodiscover.xml;
        default_type application/xml;
    }

    # Proxy to Next.js frontend
    location / {
        proxy_pass http://frontend_app;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Next.js static files
    location /_next/static {
        proxy_pass http://frontend_app;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}

# ─────────────────────────────────────────────
# HTTPS — Webmail (mail.hireadda.in)
# ─────────────────────────────────────────────
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name mail.hireadda.in;

    # SSL — uses separate cert (already exists from certbot standalone)
    ssl_certificate /etc/letsencrypt/live/mail.hireadda.in/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/mail.hireadda.in/privkey.pem;
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:50m;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;

    # Security headers
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;

    # Upload limit (match Roundcube's 25MB)
    client_max_body_size 25m;

    # Proxy to Roundcube container (same Docker network)
    location / {
        proxy_pass http://roundcube:80;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# ─────────────────────────────────────────────
# HTTPS — Grafana (grafana.hireadda.in)
# ─────────────────────────────────────────────
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name grafana.hireadda.in;

    ssl_certificate /etc/letsencrypt/live/hireadda.in/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/hireadda.in/privkey.pem;
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:50m;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;

    # Security headers
    add_header Strict-Transport-Security "max-age=63072000" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;

    # Proxy to Grafana
    location / {
        proxy_pass http://grafana:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # WebSocket support for Grafana Live
    location /api/live/ {
        proxy_pass http://grafana:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
    }
}

# ─────────────────────────────────────────────
# HTTPS — OpenSearch Dashboards (logs.hireadda.in)
# ─────────────────────────────────────────────
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name logs.hireadda.in;

    ssl_certificate /etc/letsencrypt/live/hireadda.in/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/hireadda.in/privkey.pem;
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:50m;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;

    # Security headers
    add_header Strict-Transport-Security "max-age=63072000" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;

    # Basic auth (OpenSearch Dashboards has no built-in auth)
    auth_basic "HireAdda Logs";
    auth_basic_user_file /etc/nginx/.htpasswd;

    # Proxy to OpenSearch Dashboards
    location / {
        proxy_pass http://opensearch-dashboards:5601;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffer_size 128k;
        proxy_buffers 4 256k;
        proxy_busy_buffers_size 256k;
    }
}

# ─────────────────────────────────────────────
# Internal — stub_status for nginx-exporter
# (port 8080, not exposed externally)
# ─────────────────────────────────────────────
server {
    listen 8080;
    server_name _;

    location /stub_status {
        stub_status;
        allow 172.16.0.0/12;
        allow 10.0.0.0/8;
        allow 192.168.0.0/16;
        deny all;
    }

    location / {
        return 404;
    }
}
