# ============================================================
# Hire Adda — Production Docker Compose
# Canonical deployment for VPS (hireadda.in)
# ============================================================
# Blue-Green / Canary deployment:
#   - backend-blue + backend-green (traffic controlled by nginx upstreams)
#   - frontend-blue + frontend-green (paired with same-color backend)
#   - deploy.sh manages upstream weights, health checks, rollback
#
# Usage (VPS — pulls prebuilt GHCR images):
#   1. Copy .env.example → .env and fill in values
#   2. docker login ghcr.io (GHCR credentials)
#   3. docker compose up -d
#   4. make ssl-init EMAIL=admin@hireadda.in
#
# Local dev (with docker-compose.override.yml present):
#   1. docker compose build && docker compose up -d
#
# Mail server runs separately: cd infra/mail && docker compose up -d
# ============================================================

services:
  # ===========================================
  # Nginx Reverse Proxy
  # ===========================================
  nginx:
    image: nginx:1.27-alpine
    container_name: hireadda_nginx
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.5'
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./nginx/upstreams:/etc/nginx/upstreams
      - ./nginx/htpasswd:/etc/nginx/.htpasswd:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - uploads_data:/var/www/uploads:ro
      - certbot_webroot:/var/www/certbot:ro
      - ../mail/config/autoconfig.xml:/etc/nginx/mail/autoconfig.xml:ro
      - ../mail/config/autodiscover.xml:/etc/nginx/mail/autodiscover.xml:ro
    depends_on:
      backend-blue:
        condition: service_healthy
        required: false
      frontend-blue:
        condition: service_healthy
        required: false
      backend-green:
        condition: service_healthy
        required: false
      frontend-green:
        condition: service_healthy
        required: false
    command: '/bin/sh -c ''while :; do sleep 6h & wait $${!}; nginx -s reload; done & nginx -g "daemon off;"'''
    networks:
      - hireadda_network
    healthcheck:
      test: ['CMD', 'nginx', '-t']
      interval: 30s
      timeout: 10s
      retries: 3
    logging:
      driver: 'json-file'
      options:
        max-size: '10m'
        max-file: '5'

  # ===========================================
  # Certbot (Let's Encrypt SSL)
  # ===========================================
  certbot:
    image: certbot/certbot:latest
    container_name: hireadda_certbot
    restart: unless-stopped
    volumes:
      - /etc/letsencrypt:/etc/letsencrypt
      - certbot_webroot:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew --webroot -w /var/www/certbot; sleep 12h & wait $${!}; done'"
    depends_on:
      - nginx
    logging:
      driver: 'json-file'
      options:
        max-size: '5m'
        max-file: '3'

  # ===========================================
  # Frontend — Blue (Next.js 16)
  # ===========================================
  frontend-blue:
    container_name: hireadda_frontend_blue
    image: ghcr.io/${GHCR_OWNER:-chandreshkkhatri}/hire-adda-frontend:${BLUE_FRONTEND_TAG:-latest}
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '1.0'
    environment:
      - NODE_ENV=production
      - BACKEND_INTERNAL_URL=http://backend-blue:5000/api/v1
      - BFF_SECRET=${BFF_SECRET}
      - COOKIE_ACCESS_MAX_AGE_DAYS=${COOKIE_ACCESS_MAX_AGE_DAYS:-7}
      - COOKIE_REFRESH_MAX_AGE_DAYS=${COOKIE_REFRESH_MAX_AGE_DAYS:-30}
      # IndexNow — site key + bearer token gating /api/indexnow-ping.
      # Backend mutation paths ping api.indexnow.org directly; this
      # token is for the optional CI bulk-ping after each deploy.
      - INDEXNOW_KEY=${INDEXNOW_KEY}
      - INDEXNOW_PING_TOKEN=${INDEXNOW_PING_TOKEN}
      - OTEL_ENABLED=true
      - OTEL_SERVICE_NAME=hire-adda-frontend
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4318/v1/traces
    networks:
      - hireadda_network
    healthcheck:
      test:
        [
          'CMD',
          'node',
          '-e',
          "require('http').get('http://127.0.0.1:3000/', (r) => process.exit(r.statusCode === 200 ? 0 : 1))",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    logging:
      driver: 'json-file'
      options:
        max-size: '10m'
        max-file: '3'

  # ===========================================
  # Frontend — Green (Next.js 16)
  # ===========================================
  frontend-green:
    container_name: hireadda_frontend_green
    image: ghcr.io/${GHCR_OWNER:-chandreshkkhatri}/hire-adda-frontend:${GREEN_FRONTEND_TAG:-latest}
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '1.0'
    environment:
      - NODE_ENV=production
      - BACKEND_INTERNAL_URL=http://backend-green:5000/api/v1
      - BFF_SECRET=${BFF_SECRET}
      - COOKIE_ACCESS_MAX_AGE_DAYS=${COOKIE_ACCESS_MAX_AGE_DAYS:-7}
      - COOKIE_REFRESH_MAX_AGE_DAYS=${COOKIE_REFRESH_MAX_AGE_DAYS:-30}
      # IndexNow — site key + bearer token gating /api/indexnow-ping.
      # Backend mutation paths ping api.indexnow.org directly; this
      # token is for the optional CI bulk-ping after each deploy.
      - INDEXNOW_KEY=${INDEXNOW_KEY}
      - INDEXNOW_PING_TOKEN=${INDEXNOW_PING_TOKEN}
      - OTEL_ENABLED=true
      - OTEL_SERVICE_NAME=hire-adda-frontend
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4318/v1/traces
    networks:
      - hireadda_network
    healthcheck:
      test:
        [
          'CMD',
          'node',
          '-e',
          "require('http').get('http://127.0.0.1:3000/', (r) => process.exit(r.statusCode === 200 ? 0 : 1))",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    logging:
      driver: 'json-file'
      options:
        max-size: '10m'
        max-file: '3'

  # ===========================================
  # Backend API — Blue (Express 5)
  # ===========================================
  backend-blue:
    container_name: hireadda_backend_blue
    image: ghcr.io/${GHCR_OWNER:-chandreshkkhatri}/hire-adda-backend:${BLUE_BACKEND_TAG:-latest}
    restart: unless-stopped
    stop_grace_period: 30s
    sysctls:
      - net.ipv6.conf.all.disable_ipv6=1
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '1.0'
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - PORT=5000
      # DATABASE_URL, REDIS_HOST/PORT, KAFKA_BROKERS come from .env
      # (cloud endpoints for Phase 1, Docker hostnames when profiles are active)
      - ELASTICSEARCH_URL=http://opensearch:9200
      - FRONTEND_URL=https://hireadda.in
      - CORS_ORIGIN=https://hireadda.in,https://www.hireadda.in
      - SMTP_HOST=mail.hireadda.in
      - SMTP_PORT=587
      - SMTP_USER=${SMTP_USER:-noreply@hireadda.in}
      - SMTP_PASS=${SMTP_PASS}
      - EMAIL_FROM=${EMAIL_FROM:-noreply@hireadda.in}
      - WEBAUTHN_RP_ID=hireadda.in
      - WEBAUTHN_RP_NAME=HireAdda
      - WEBAUTHN_ORIGIN=https://hireadda.in
      - OTEL_ENABLED=true
      - OTEL_SERVICE_NAME=hire-adda-api-blue
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4318/v1/traces
    volumes:
      - uploads_data:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
        required: false
      redis:
        condition: service_healthy
        required: false
      kafka:
        condition: service_healthy
        required: false
    networks:
      - hireadda_network
      - mail_network
    healthcheck:
      test:
        [
          'CMD',
          'node',
          '-e',
          "require('http').get('http://localhost:5000/health/live', (r) => process.exit(r.statusCode === 200 ? 0 : 1))",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    logging:
      driver: 'json-file'
      options:
        max-size: '10m'
        max-file: '5'

  # ===========================================
  # Backend API — Green (Express 5)
  # ===========================================
  backend-green:
    container_name: hireadda_backend_green
    image: ghcr.io/${GHCR_OWNER:-chandreshkkhatri}/hire-adda-backend:${GREEN_BACKEND_TAG:-latest}
    restart: unless-stopped
    stop_grace_period: 30s
    sysctls:
      - net.ipv6.conf.all.disable_ipv6=1
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '1.0'
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - PORT=5000
      # DATABASE_URL, REDIS_HOST/PORT, KAFKA_BROKERS come from .env
      # (cloud endpoints for Phase 1, Docker hostnames when profiles are active)
      - ELASTICSEARCH_URL=http://opensearch:9200
      - FRONTEND_URL=https://hireadda.in
      - CORS_ORIGIN=https://hireadda.in,https://www.hireadda.in
      - SMTP_HOST=mail.hireadda.in
      - SMTP_PORT=587
      - SMTP_USER=${SMTP_USER:-noreply@hireadda.in}
      - SMTP_PASS=${SMTP_PASS}
      - EMAIL_FROM=${EMAIL_FROM:-noreply@hireadda.in}
      - WEBAUTHN_RP_ID=hireadda.in
      - WEBAUTHN_RP_NAME=HireAdda
      - WEBAUTHN_ORIGIN=https://hireadda.in
      - OTEL_ENABLED=true
      - OTEL_SERVICE_NAME=hire-adda-api-green
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4318/v1/traces
    volumes:
      - uploads_data:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
        required: false
      redis:
        condition: service_healthy
        required: false
      kafka:
        condition: service_healthy
        required: false
    networks:
      - hireadda_network
      - mail_network
    healthcheck:
      test:
        [
          'CMD',
          'node',
          '-e',
          "require('http').get('http://localhost:5000/health/live', (r) => process.exit(r.statusCode === 200 ? 0 : 1))",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    logging:
      driver: 'json-file'
      options:
        max-size: '10m'
        max-file: '5'

  # ===========================================
  # PostgreSQL 16 (profile: vps-postgres)
  # Only started when COMPOSE_PROFILES includes vps-postgres.
  # Otherwise, backend connects to external PostgreSQL (Neon/Supabase) via DATABASE_URL in .env.
  # ===========================================
  postgres:
    profiles: ['vps-postgres']
    image: postgres:16-alpine
    container_name: hireadda_postgres
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '1.0'
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=hireadda
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - hireadda_network
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d hireadda']
      interval: 10s
      timeout: 5s
      retries: 5
    logging:
      driver: 'json-file'
      options:
        max-size: '10m'
        max-file: '3'

  # ===========================================
  # Redis 7 (Cache + BullMQ Job Queues) (profile: vps-redis)
  # Only started when COMPOSE_PROFILES includes vps-redis.
  # Otherwise, backend connects to external Redis (Redis Cloud/Upstash) via REDIS_HOST in .env.
  # ===========================================
  redis:
    profiles: ['vps-redis']
    image: redis:7-alpine
    container_name: hireadda_redis
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy noeviction --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    networks:
      - hireadda_network
    healthcheck:
      test: ['CMD', 'redis-cli', '-a', '${REDIS_PASSWORD}', '--no-auth-warning', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
    logging:
      driver: 'json-file'
      options:
        max-size: '5m'
        max-file: '3'

  # ===========================================
  # OpenSearch 2.18 (Search Engine)
  # ===========================================
  opensearch:
    image: opensearchproject/opensearch:2.18.0
    container_name: hireadda_opensearch
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: '1.0'
    environment:
      - cluster.name=hireadda
      - node.name=opensearch-node1
      - discovery.type=single-node
      - OPENSEARCH_JAVA_OPTS=-Xms1g -Xmx1g
      - DISABLE_SECURITY_PLUGIN=true
      - DISABLE_INSTALL_DEMO_CONFIG=true
      - path.repo=/usr/share/opensearch/snapshots
    volumes:
      - opensearch_data:/usr/share/opensearch/data
      - opensearch_snapshots:/usr/share/opensearch/snapshots
    networks:
      - hireadda_network
    healthcheck:
      test: ['CMD-SHELL', 'curl -sf http://localhost:9200/_cluster/health || exit 1']
      interval: 30s
      timeout: 10s
      retries: 5
    logging:
      driver: 'json-file'
      options:
        max-size: '10m'
        max-file: '3'

  # ===========================================
  # OpenSearch Dashboards (Log visualization UI)
  # ===========================================
  opensearch-dashboards:
    image: opensearchproject/opensearch-dashboards:2.18.0
    container_name: hireadda_opensearch_dashboards
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'
    environment:
      - OPENSEARCH_HOSTS=["http://opensearch:9200"]
      - DISABLE_SECURITY_DASHBOARDS_PLUGIN=true
    depends_on:
      opensearch:
        condition: service_healthy
    networks:
      - hireadda_network
    healthcheck:
      test: ['CMD-SHELL', 'curl -sf http://localhost:5601/api/status || exit 1']
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    logging:
      driver: 'json-file'
      options:
        max-size: '5m'
        max-file: '3'

  # ===========================================
  # Apache Kafka 3.8 (KRaft mode — no ZooKeeper) (profile: vps-kafka)
  # Only started when COMPOSE_PROFILES includes vps-kafka.
  # Otherwise, backend connects to external Kafka (Aiven/Confluent) via KAFKA_BROKERS in .env.
  # ===========================================
  kafka:
    profiles: ['vps-kafka']
    image: apache/kafka:3.8.1
    container_name: hireadda_kafka
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '0.5'
    environment:
      # KRaft mode (no ZooKeeper)
      - KAFKA_NODE_ID=1
      - KAFKA_PROCESS_ROLES=broker,controller
      - KAFKA_CONTROLLER_QUORUM_VOTERS=1@kafka:9093
      # Listeners
      - KAFKA_LISTENERS=PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      - KAFKA_ADVERTISED_LISTENERS=PLAINTEXT://kafka:9092
      - KAFKA_LISTENER_SECURITY_PROTOCOL_MAP=PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      - KAFKA_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - KAFKA_INTER_BROKER_LISTENER_NAME=PLAINTEXT
      # Single broker tuning
      - KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR=1
      - KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR=1
      - KAFKA_TRANSACTION_STATE_LOG_MIN_ISR=1
      - KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS=0
      - KAFKA_NUM_PARTITIONS=3
      - KAFKA_DEFAULT_REPLICATION_FACTOR=1
      # Log retention
      - KAFKA_LOG_RETENTION_HOURS=168
      - KAFKA_LOG_RETENTION_BYTES=5368709120
      - KAFKA_LOG_SEGMENT_BYTES=1073741824
      # JVM — limited for VPS
      - KAFKA_HEAP_OPTS=-Xmx512m -Xms512m
      - KAFKA_AUTO_CREATE_TOPICS_ENABLE=true
    volumes:
      - kafka_data:/var/lib/kafka/data
    networks:
      - hireadda_network
    healthcheck:
      test:
        [
          'CMD-SHELL',
          '/opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server localhost:9092 > /dev/null 2>&1',
        ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    logging:
      driver: 'json-file'
      options:
        max-size: '10m'
        max-file: '5'

  # ===========================================
  # Roundcube Webmail
  # Connects to Docker mailserver via shared mail network
  # ===========================================
  roundcube:
    image: roundcube/roundcubemail:latest
    container_name: hireadda_roundcube
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.25'
    environment:
      - ROUNDCUBEMAIL_DEFAULT_HOST=tls://mail.hireadda.in
      - ROUNDCUBEMAIL_DEFAULT_PORT=143
      - ROUNDCUBEMAIL_SMTP_SERVER=tls://mail.hireadda.in
      - ROUNDCUBEMAIL_SMTP_PORT=587
      - ROUNDCUBEMAIL_UPLOAD_MAX_FILESIZE=25M
      - ROUNDCUBEMAIL_SKIN=elastic
      - ROUNDCUBEMAIL_PLUGINS=archive,managesieve,zipdownload,markasjunk
      - ROUNDCUBEMAIL_DB_TYPE=sqlite
    volumes:
      - roundcube_data:/var/roundcube/db
      - roundcube_temp:/tmp/roundcube-temp
    networks:
      - hireadda_network
      - mail_network
    healthcheck:
      test: ['CMD', 'curl', '-sf', 'http://localhost:80/']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    logging:
      driver: 'json-file'
      options:
        max-size: '5m'
        max-file: '3'

  # ===========================================
  # Prometheus (Metrics collection)
  # ===========================================
  prometheus:
    image: prom/prometheus:v2.54.0
    container_name: hireadda_prometheus
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.25'
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=15d'
      - '--storage.tsdb.retention.size=10GB'
      - '--web.enable-lifecycle'
      - '--web.enable-remote-write-receiver'
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    networks:
      - hireadda_network
    healthcheck:
      test:
        ['CMD', 'wget', '--no-verbose', '--tries=1', '--spider', 'http://localhost:9090/-/healthy']
      interval: 30s
      timeout: 10s
      retries: 3
    logging:
      driver: 'json-file'
      options:
        max-size: '10m'
        max-file: '3'

  # ===========================================
  # Grafana (Dashboards & Visualization)
  # ===========================================
  grafana:
    image: grafana/grafana:11.3.0
    container_name: hireadda_grafana
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.25'
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-CHANGE_ME}
      - GF_SERVER_ROOT_URL=https://grafana.hireadda.in
      - GF_SERVER_DOMAIN=grafana.hireadda.in
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_AUTH_ANONYMOUS_ENABLED=false
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus
    networks:
      - hireadda_network
    healthcheck:
      test:
        ['CMD', 'wget', '--no-verbose', '--tries=1', '--spider', 'http://localhost:3000/api/health']
      interval: 30s
      timeout: 10s
      retries: 3
    logging:
      driver: 'json-file'
      options:
        max-size: '5m'
        max-file: '3'

  # ===========================================
  # Node Exporter (Host metrics)
  # ===========================================
  node-exporter:
    image: prom/node-exporter:v1.8.2
    container_name: hireadda_node_exporter
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 64M
          cpus: '0.1'
    command:
      - '--path.procfs=/host/proc'
      - '--path.sysfs=/host/sys'
      - '--path.rootfs=/host/root'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/host/root:ro
    networks:
      - hireadda_network
    logging:
      driver: 'json-file'
      options:
        max-size: '5m'
        max-file: '3'

  # ===========================================
  # Redis Exporter (Redis metrics for Prometheus) (profile: vps-redis)
  # ===========================================
  redis-exporter:
    profiles: ['vps-redis']
    image: oliver006/redis_exporter:v1.66.0-alpine
    container_name: hireadda_redis_exporter
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 64M
          cpus: '0.1'
    environment:
      - REDIS_ADDR=redis://default:${REDIS_PASSWORD}@redis:6379
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - hireadda_network
    logging:
      driver: 'json-file'
      options:
        max-size: '5m'
        max-file: '3'

  # ===========================================
  # Kafka Exporter (Kafka metrics for Prometheus) (profile: vps-kafka)
  # ===========================================
  kafka-exporter:
    profiles: ['vps-kafka']
    image: danielqsj/kafka-exporter:v1.8.0
    container_name: hireadda_kafka_exporter
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 64M
          cpus: '0.1'
    command:
      - '--kafka.server=kafka:9092'
      - '--topic.filter=ha\..*|hire-adda\..*'
    depends_on:
      kafka:
        condition: service_healthy
    networks:
      - hireadda_network
    logging:
      driver: 'json-file'
      options:
        max-size: '5m'
        max-file: '3'

  # ===========================================
  # cAdvisor (Docker container metrics)
  # ===========================================
  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.51.0
    # NOTE: cAdvisor cannot discover Docker containers on this VPS because
    # Docker 29 uses containerd snapshotter (overlayfs) which lacks the
    # legacy layerdb structure cAdvisor expects. It still exports host-level
    # cgroup metrics. Per-container metrics come from Prometheus scrape targets.
    container_name: hireadda_cadvisor
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: '0.2'
    privileged: true
    devices:
      - /dev/kmsg:/dev/kmsg
    command:
      - '--docker_only=true'
      - '--housekeeping_interval=30s'
      - '--disable_metrics=percpu,sched,tcp,udp,disk,diskIO,hugetlb,referenced_memory,resctrl,process'
      - '--containerd=/run/containerd/containerd.sock'
      - '--containerd-namespace=moby'
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /run/containerd/containerd.sock:/run/containerd/containerd.sock:ro
      - /sys:/sys:ro
      - /sys/fs/cgroup:/sys/fs/cgroup:ro
      - /var/lib/docker:/var/lib/docker:ro
      - /var/lib/containerd:/var/lib/containerd:ro
      - /dev/disk:/dev/disk:ro
    networks:
      - hireadda_network
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://localhost:8080/healthz || exit 1']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    logging:
      driver: 'json-file'
      options:
        max-size: '5m'
        max-file: '3'

  # ===========================================
  # Nginx Exporter (nginx metrics for Prometheus)
  # ===========================================
  nginx-exporter:
    image: nginx/nginx-prometheus-exporter:1.3.0
    container_name: hireadda_nginx_exporter
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 64M
          cpus: '0.1'
    command:
      - '--nginx.scrape-uri=http://nginx:8080/stub_status'
    depends_on:
      nginx:
        condition: service_healthy
    networks:
      - hireadda_network
    logging:
      driver: 'json-file'
      options:
        max-size: '5m'
        max-file: '3'

  # ===========================================
  # OTel Collector (trace fan-out: Tempo + Honeycomb)
  # ===========================================
  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.114.0
    container_name: hireadda_otel_collector
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: '0.15'
    command: --config=/etc/otelcol/config.yml
    environment:
      - HONEYCOMB_API_KEY=${HONEYCOMB_API_KEY:-}
    volumes:
      - ./otel-collector/otel-collector-config.yml:/etc/otelcol/config.yml:ro
    depends_on:
      tempo:
        condition: service_healthy
    networks:
      - hireadda_network
    healthcheck:
      disable: true
    logging:
      driver: 'json-file'
      options:
        max-size: '5m'
        max-file: '3'

  # ===========================================
  # Grafana Tempo (Distributed tracing backend)
  # ===========================================
  tempo:
    image: grafana/tempo:2.6.1
    container_name: hireadda_tempo
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.25'
    command: -config.file=/etc/tempo/tempo-config.yml
    volumes:
      - ./tempo/tempo-config.yml:/etc/tempo/tempo-config.yml:ro
      - tempo_data:/var/tempo
    networks:
      - hireadda_network
    healthcheck:
      test: ['CMD', 'wget', '--no-verbose', '--tries=1', '--spider', 'http://localhost:3200/ready']
      interval: 30s
      timeout: 10s
      retries: 3
    logging:
      driver: 'json-file'
      options:
        max-size: '5m'
        max-file: '3'

  # ===========================================
  # Loki (Log aggregation)
  # ===========================================
  loki:
    image: grafana/loki:3.2.0
    container_name: hireadda_loki
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.25'
    command: -config.file=/etc/loki/loki-config.yml
    volumes:
      - ./loki/loki-config.yml:/etc/loki/loki-config.yml:ro
      - loki_data:/loki
    networks:
      - hireadda_network
    healthcheck:
      test:
        ['CMD-SHELL', 'wget --no-verbose --tries=1 --spider http://localhost:3100/ready || exit 1']
      interval: 30s
      timeout: 10s
      retries: 3
    logging:
      driver: 'json-file'
      options:
        max-size: '5m'
        max-file: '3'

  # ===========================================
  # Promtail (Log shipping to Loki)
  # ===========================================
  promtail:
    image: grafana/promtail:3.2.0
    container_name: hireadda_promtail
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: '0.1'
    command: -config.file=/etc/promtail/promtail-config.yml
    volumes:
      - ./promtail/promtail-config.yml:/etc/promtail/promtail-config.yml:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/log:/var/log:ro
      - promtail_positions:/tmp/positions
    depends_on:
      - loki
    networks:
      - hireadda_network
    logging:
      driver: 'json-file'
      options:
        max-size: '5m'
        max-file: '3'

  # ===========================================
  # Fluent Bit (Log shipping to OpenSearch)
  # ===========================================
  fluent-bit:
    image: fluent/fluent-bit:3.2
    container_name: hireadda_fluent_bit
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 64M
          cpus: '0.1'
    volumes:
      - ./fluent-bit/fluent-bit.conf:/fluent-bit/etc/fluent-bit.conf:ro
      - ./fluent-bit/parsers.conf:/fluent-bit/etc/parsers.conf:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - fluentbit_db:/fluent-bit/db
    depends_on:
      opensearch:
        condition: service_healthy
    networks:
      - hireadda_network
    logging:
      driver: 'json-file'
      options:
        max-size: '5m'
        max-file: '3'

# ===========================================
# Networks
# ===========================================
networks:
  hireadda_network:
    driver: bridge
  mail_network:
    external: true
    name: mail-server_default

# ===========================================
# Volumes
# ===========================================
volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  opensearch_data:
    driver: local
  opensearch_snapshots:
    driver: local
  uploads_data:
    driver: local
  certbot_webroot:
    driver: local
  roundcube_data:
    driver: local
  roundcube_temp:
    driver: local
  kafka_data:
    driver: local
  prometheus_data:
    driver: local
  grafana_data:
    driver: local
  loki_data:
    driver: local
  promtail_positions:
    driver: local
  tempo_data:
    driver: local
  fluentbit_db:
    driver: local
