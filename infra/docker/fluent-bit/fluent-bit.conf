# ============================================================
# Fluent Bit Configuration — Docker Compose
# Collects container logs and ships to OpenSearch
# ============================================================

[SERVICE]
    Daemon        Off
    Flush         5
    Log_Level     warn
    Parsers_File  /fluent-bit/etc/parsers.conf
    HTTP_Server   On
    HTTP_Listen   0.0.0.0
    HTTP_Port     2020
    Health_Check  On

# ── Inputs ──────────────────────────────────────────────────
[INPUT]
    Name              tail
    Tag               docker.*
    Path              /var/lib/docker/containers/*/*-json.log
    Parser            docker
    DB                /fluent-bit/db/flb_docker.db
    Mem_Buf_Limit     10MB
    Skip_Long_Lines   On
    Refresh_Interval  10

# ── Filters ─────────────────────────────────────────────────
# Extract container name from log path
[FILTER]
    Name          parser
    Match         docker.*
    Key_Name      log
    Parser        json_log
    Reserve_Data  On

# Add metadata
[FILTER]
    Name    modify
    Match   docker.*
    Add     environment production
    Add     platform docker-compose
    Add     cluster hireadda-vps

# Remove noisy health-check logs
[FILTER]
    Name    grep
    Match   docker.*
    Exclude log (/health|/stub_status|GET /ready|GET /loki/api)

# ── Outputs ─────────────────────────────────────────────────
[OUTPUT]
    Name            opensearch
    Match           docker.*
    Host            opensearch
    Port            9200
    Index           logs-hire-adda
    Type            _doc
    Logstash_Format On
    Logstash_Prefix logs-hire-adda
    Suppress_Type_Name On
    Retry_Limit     3
    tls             Off
    Replace_Dots    On
    Trace_Error     On
