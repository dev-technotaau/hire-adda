# Dashboard provisioning — loads JSON files from /var/lib/grafana/dashboards
apiVersion: 1
providers:
  - name: 'Hire Adda'
    orgId: 1
    folder: 'Hire Adda'
    type: file
    disableDeletion: false
    updateIntervalSeconds: 60
    allowUiUpdates: true
    options:
      path: /var/lib/grafana/dashboards
      foldersFromFilesStructure: false
