# ============================================================
# Prometheus Configuration — Talent Bridge Docker Compose
# Scrape interval: 30s (matches K8s kube-prometheus values)
# ============================================================
global:
  scrape_interval: 30s
  evaluation_interval: 30s
  scrape_timeout: 10s

# ── Scrape Targets ──
scrape_configs:
  # ── Backend API (/metrics via prom-client) ──
  - job_name: 'backend-blue'
    metrics_path: /metrics
    static_configs:
      - targets: ['backend-blue:5000']
        labels:
          service: backend
          color: blue
          environment: production

  - job_name: 'backend-green'
    metrics_path: /metrics
    static_configs:
      - targets: ['backend-green:5000']
        labels:
          service: backend
          color: green
          environment: production

  # ── cAdvisor (Docker container metrics) ──
  - job_name: 'cadvisor'
    static_configs:
      - targets: ['cadvisor:8080']
        labels:
          service: cadvisor
          environment: production

  # ── Nginx Exporter ──
  - job_name: 'nginx'
    static_configs:
      - targets: ['nginx-exporter:9113']
        labels:
          service: nginx
          environment: production

  # ── Redis Exporter ──
  - job_name: 'redis'
    static_configs:
      - targets: ['redis-exporter:9121']
        labels:
          service: redis
          environment: production

  # ── Kafka Exporter ──
  - job_name: 'kafka'
    static_configs:
      - targets: ['kafka-exporter:9308']
        labels:
          service: kafka
          environment: production

  # ── Node Exporter (host metrics) ──
  - job_name: 'node'
    static_configs:
      - targets: ['node-exporter:9100']
        labels:
          service: node
          environment: production

  # ── Prometheus self-monitoring ──
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # ── Fluent Bit ──
  - job_name: 'fluent-bit'
    metrics_path: /api/v1/metrics/prometheus
    static_configs:
      - targets: ['fluent-bit:2020']
        labels:
          service: fluent-bit
          environment: production

  # ── OTel Collector ──
  - job_name: 'otel-collector'
    static_configs:
      - targets: ['otel-collector:8888']
        labels:
          service: otel-collector
          environment: production

  # ── Tempo ──
  - job_name: 'tempo'
    static_configs:
      - targets: ['tempo:3200']
        labels:
          service: tempo
          environment: production

  # ── Loki ──
  - job_name: 'loki'
    static_configs:
      - targets: ['loki:3100']
        labels:
          service: loki
