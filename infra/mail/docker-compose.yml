# ============================================================
# Docker Mailserver for hireadda.in
# https://docker-mailserver.github.io/docker-mailserver/latest/
# ============================================================
# Runs independently from the application stack.
# Provides SMTP/IMAP with DKIM, SPF, DMARC, anti-spam.
#
# Quick start:
#   1. Copy .env.example → .env and fill in values
#   2. make mail-setup        (creates account + DKIM key)
#   3. Add DNS records        (see DNS-RECORDS.md)
#   4. make mail-up           (start the server)
#   5. make mail-test         (verify connectivity)
# ============================================================

services:
  mailserver:
    image: ghcr.io/docker-mailserver/docker-mailserver:latest
    container_name: hireadda_mailserver
    hostname: mail.hireadda.in
    domainname: hireadda.in
    restart: always
    stop_grace_period: 1m

    ports:
      - "25:25"       # SMTP  (incoming mail from other servers)
      - "465:465"     # SMTPS (secure SMTP submission)
      - "587:587"     # SMTP  (STARTTLS submission)
      - "993:993"     # IMAPS (secure IMAP for mail clients)

    volumes:
      - mail_data:/var/mail
      - mail_state:/var/mail-state
      - mail_logs:/var/log/mail
      - mail_config:/tmp/docker-mailserver
      - ./config/:/tmp/docker-mailserver/
      - /etc/localtime:/etc/localtime:ro

      # Share Let's Encrypt certs from the app's certbot
      # If your app certbot volume is named certbot_certs, use:
      # - certbot_certs:/etc/letsencrypt:ro
      # Otherwise, mount the host cert path:
      - ${LETSENCRYPT_PATH:-/etc/letsencrypt}:/etc/letsencrypt:ro

    environment:
      # ── General ──
      - OVERRIDE_HOSTNAME=mail.hireadda.in
      - LOG_LEVEL=info
      - SUPERVISOR_LOGLEVEL=warn
      - ONE_DIR=1
      - PERMIT_DOCKER=none
      - TZ=${TZ:-Asia/Kolkata}

      # ── Accounts ──
      - ACCOUNT_PROVISIONER=FILE
      - ENABLE_QUOTAS=1

      # ── TLS / SSL ──
      - SSL_TYPE=letsencrypt
      - SSL_DOMAIN=mail.hireadda.in

      # ── Authentication ──
      - ENABLE_SASLAUTHD=0
      - ENABLE_LDAP=0
      - ENABLE_OAUTH2=0

      # ── Protocols ──
      - ENABLE_POP3=0
      - ENABLE_IMAP=1
      - ENABLE_SMTP_AUTH=1

      # ── Anti-Spam ──
      - ENABLE_SPAMASSASSIN=1
      - SPAMASSASSIN_SPAM_TO_INBOX=1
      - MOVE_SPAM_TO_JUNK=1
      - SA_TAG=2.0
      - SA_TAG2=6.31
      - SA_KILL=10.0

      # ── Anti-Virus ──
      - ENABLE_CLAMAV=0
      # ClamAV uses ~1GB RAM; enable if you have resources:
      # - ENABLE_CLAMAV=1

      # ── DKIM / DMARC ──
      - ENABLE_OPENDKIM=1
      - ENABLE_OPENDMARC=1

      # ── Fail2ban (brute-force protection) ──
      - ENABLE_FAIL2BAN=1
      - FAIL2BAN_BLOCKTYPE=drop

      # ── Postgrey (greylisting) ──
      - ENABLE_POSTGREY=1
      - POSTGREY_DELAY=30
      - POSTGREY_MAX_AGE=35
      - POSTGREY_AUTO_WHITELIST_CLIENTS=5
      - POSTGREY_TEXT=Delayed by postgrey

      # ── Postscreen (SMTP-level protection) ──
      - ENABLE_POSTSCREEN=1

      # ── Rate Limiting ──
      - POSTFIX_MESSAGE_SIZE_LIMIT=26214400
      - ENABLE_SRS=1

      # ── Logging ──
      - PFLOGSUMM_TRIGGER=logrotate
      - LOGWATCH_INTERVAL=weekly

    cap_add:
      - NET_ADMIN  # Required for fail2ban
      - SYS_PTRACE # Required for process monitoring

    healthcheck:
      test: ["CMD", "ss", "--listening", "--tcp", "--no-header", "( sport = :smtp )"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "5"

  # ── Roundcube Webmail ──
  roundcube:
    image: roundcube/roundcubemail:latest
    container_name: hireadda_webmail
    restart: always
    depends_on:
      mailserver:
        condition: service_healthy

    environment:
      - ROUNDCUBEMAIL_DEFAULT_HOST=tls://mailserver
      - ROUNDCUBEMAIL_DEFAULT_PORT=143
      - ROUNDCUBEMAIL_SMTP_SERVER=tls://mailserver
      - ROUNDCUBEMAIL_SMTP_PORT=587
      - ROUNDCUBEMAIL_UPLOAD_MAX_FILESIZE=25M
      - ROUNDCUBEMAIL_SKIN=elastic
      - ROUNDCUBEMAIL_PLUGINS=archive,managesieve,zipdownload,markasjunk
      - ROUNDCUBEMAIL_DB_TYPE=sqlite

    volumes:
      - roundcube_data:/var/roundcube/db
      - roundcube_temp:/tmp/roundcube-temp
      - ./roundcube-custom.php:/var/roundcube/config/custom.config.php:ro

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ── Nginx (reverse proxy + SSL for webmail) ──
  nginx:
    image: nginx:alpine
    container_name: hireadda_webmail_nginx
    restart: always
    depends_on:
      roundcube:
        condition: service_healthy

    ports:
      - "80:80"
      - "443:443"

    volumes:
      - ./webmail-nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro

    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  mail_data:
    driver: local
  mail_state:
    driver: local
  mail_logs:
    driver: local
  mail_config:
    driver: local
  roundcube_data:
    driver: local
  roundcube_temp:
    driver: local
