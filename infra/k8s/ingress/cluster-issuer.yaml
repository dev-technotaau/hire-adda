# ============================================================
# Let's Encrypt ClusterIssuer via cert-manager
# Automatically provisions and renews SSL certificates
# ============================================================
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-prod
spec:
  acme:
    server: https://acme-v02.api.letsencrypt.org/directory
    email: admin@hireadda.in
    privateKeySecretRef:
      name: letsencrypt-prod-key
    solvers:
      - http01:
          ingress:
            class: nginx
---
# Staging issuer for testing (higher rate limits)
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-staging
spec:
  acme:
    server: https://acme-staging-v02.api.letsencrypt.org/directory
    email: admin@hireadda.in
    privateKeySecretRef:
      name: letsencrypt-staging-key
    solvers:
      - http01:
          ingress:
            class: nginx
---
# DNS-01 issuer — used for hosts that can't be reached via HTTP-01
# (e.g. mail.hireadda.in, where port 80 is bound by ingress-nginx
# on the same node, and the mail server itself doesn't terminate
# HTTP). Uses Cloudflare API token from `cf-api-token-secret` in
# the cert-manager namespace (key: api-token).
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-prod-dns
spec:
  acme:
    server: https://acme-v02.api.letsencrypt.org/directory
    email: admin@hireadda.in
    privateKeySecretRef:
      name: letsencrypt-prod-dns-key
    solvers:
      - dns01:
          cloudflare:
            apiTokenSecretRef:
              name: cf-api-token-secret
              key: api-token
        selector:
          dnsZones:
            - hireadda.in
