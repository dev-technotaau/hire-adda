# ── Mail Autodiscovery (served from frontend ingress) ──
apiVersion: v1
kind: ConfigMap
metadata:
  name: mail-autoconfig
  namespace: hire-adda
data:
  autoconfig.xml: |
    <?xml version="1.0" encoding="UTF-8"?>
    <clientConfig version="1.1">
      <emailProvider id="hireadda.in">
        <domain>hireadda.in</domain>
        <displayName>HireAdda Mail</displayName>
        <displayShortName>HireAdda</displayShortName>
        <incomingServer type="imap">
          <hostname>mail.hireadda.in</hostname>
          <port>993</port>
          <socketType>SSL</socketType>
          <authentication>password-cleartext</authentication>
          <username>%EMAILADDRESS%</username>
        </incomingServer>
        <outgoingServer type="smtp">
          <hostname>mail.hireadda.in</hostname>
          <port>587</port>
          <socketType>STARTTLS</socketType>
          <authentication>password-cleartext</authentication>
          <username>%EMAILADDRESS%</username>
        </outgoingServer>
      </emailProvider>
    </clientConfig>
  autodiscover.xml: |
    <?xml version="1.0" encoding="utf-8"?>
    <Autodiscover xmlns="http://schemas.microsoft.com/exchange/autodiscover/responseschema/2006">
      <Response xmlns="http://schemas.microsoft.com/exchange/autodiscover/outlook/responseschema/2006a">
        <Account>
          <AccountType>email</AccountType>
          <Action>settings</Action>
          <Protocol>
            <Type>IMAP</Type>
            <Server>mail.hireadda.in</Server>
            <Port>993</Port>
            <DomainRequired>off</DomainRequired>
            <LoginName></LoginName>
            <SPA>off</SPA>
            <SSL>on</SSL>
            <AuthRequired>on</AuthRequired>
          </Protocol>
          <Protocol>
            <Type>SMTP</Type>
            <Server>mail.hireadda.in</Server>
            <Port>587</Port>
            <DomainRequired>off</DomainRequired>
            <LoginName></LoginName>
            <SPA>off</SPA>
            <Encryption>TLS</Encryption>
            <AuthRequired>on</AuthRequired>
          </Protocol>
        </Account>
      </Response>
    </Autodiscover>
---
# ── Custom Proxy Headers ──
apiVersion: v1
kind: ConfigMap
metadata:
  name: custom-headers
  namespace: hire-adda
data:
  X-Forwarded-Proto: 'https'
