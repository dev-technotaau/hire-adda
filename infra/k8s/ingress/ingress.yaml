# ============================================================
# Hire Adda — Ingress Configuration
# Routes all domains through nginx-ingress with SSL
# Replaces: backend/nginx/conf.d/default.conf
# ============================================================

# ── API Ingress (api.hireadda.in) ──
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: api-ingress
  namespace: hire-adda
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    # SSL
    nginx.ingress.kubernetes.io/ssl-redirect: 'true'
    nginx.ingress.kubernetes.io/force-ssl-redirect: 'true'
    # HSTS (2 years)
    nginx.ingress.kubernetes.io/hsts: 'true'
    nginx.ingress.kubernetes.io/hsts-max-age: '63072000'
    nginx.ingress.kubernetes.io/hsts-include-subdomains: 'true'
    # Rate limiting (matches existing: 10r/s for API)
    nginx.ingress.kubernetes.io/limit-rps: '10'
    nginx.ingress.kubernetes.io/limit-burst-multiplier: '2'
    nginx.ingress.kubernetes.io/limit-connections: '20'
    # Request size (10MB for uploads)
    nginx.ingress.kubernetes.io/proxy-body-size: '10m'
    nginx.ingress.kubernetes.io/client-body-buffer-size: '128k'
    # WebSocket support for Socket.IO
    nginx.ingress.kubernetes.io/proxy-read-timeout: '3600'
    nginx.ingress.kubernetes.io/proxy-send-timeout: '3600'
    nginx.ingress.kubernetes.io/proxy-http-version: '1.1'
    # Sticky sessions for Socket.IO
    nginx.ingress.kubernetes.io/affinity: 'cookie'
    nginx.ingress.kubernetes.io/session-cookie-name: 'SERVERID'
    nginx.ingress.kubernetes.io/session-cookie-hash: 'sha1'
    nginx.ingress.kubernetes.io/session-cookie-max-age: '3600'
    # Proxy headers
    nginx.ingress.kubernetes.io/proxy-set-headers: 'hire-adda/custom-headers'
    # ModSecurity WAF
    nginx.ingress.kubernetes.io/enable-modsecurity: 'true'
    nginx.ingress.kubernetes.io/enable-owasp-modsecurity-crs: 'true'
    nginx.ingress.kubernetes.io/modsecurity-snippet: |
      SecRuleEngine On
      SecRequestBodyAccess On
      SecAuditEngine RelevantOnly
      SecAuditLogRelevantStatus "^(?:5|4(?!04))"
    # Security headers
    nginx.ingress.kubernetes.io/configuration-snippet: |
      more_set_headers "X-Frame-Options: SAMEORIGIN";
      more_set_headers "X-Content-Type-Options: nosniff";
      more_set_headers "X-XSS-Protection: 1; mode=block";
      more_set_headers "Referrer-Policy: strict-origin-when-cross-origin";
      more_set_headers "Permissions-Policy: camera=(), microphone=(), geolocation=(self), interest-cohort=()";
    # Hide server version
    nginx.ingress.kubernetes.io/server-snippet: |
      server_tokens off;
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - api.hireadda.in
      secretName: api-hireadda-tls
  rules:
    - host: api.hireadda.in
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: backend
                port:
                  number: 5000
---
# ── Auth Rate Limiting Ingress (stricter for login/register) ──
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: api-auth-ingress
  namespace: hire-adda
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/ssl-redirect: 'true'
    # Strict rate limit: 5 requests per minute for auth
    nginx.ingress.kubernetes.io/limit-rps: '1'
    nginx.ingress.kubernetes.io/limit-burst-multiplier: '5'
    nginx.ingress.kubernetes.io/limit-connections: '5'
    nginx.ingress.kubernetes.io/proxy-body-size: '1m'
    nginx.ingress.kubernetes.io/enable-modsecurity: 'true'
    nginx.ingress.kubernetes.io/enable-owasp-modsecurity-crs: 'true'
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - api.hireadda.in
      secretName: api-hireadda-tls
  rules:
    - host: api.hireadda.in
      http:
        paths:
          - path: /api/v1/auth/login
            pathType: Exact
            backend:
              service:
                name: backend
                port:
                  number: 5000
          - path: /api/v1/auth/register
            pathType: Exact
            backend:
              service:
                name: backend
                port:
                  number: 5000
---
# ── Frontend Ingress (hireadda.in) ──
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: frontend-ingress
  namespace: hire-adda
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/ssl-redirect: 'true'
    nginx.ingress.kubernetes.io/force-ssl-redirect: 'true'
    nginx.ingress.kubernetes.io/hsts: 'true'
    nginx.ingress.kubernetes.io/hsts-max-age: '63072000'
    nginx.ingress.kubernetes.io/hsts-include-subdomains: 'true'
    nginx.ingress.kubernetes.io/proxy-body-size: '1m'
    # Security headers
    nginx.ingress.kubernetes.io/configuration-snippet: |
      more_set_headers "X-Frame-Options: SAMEORIGIN";
      more_set_headers "X-Content-Type-Options: nosniff";
      more_set_headers "Referrer-Policy: strict-origin-when-cross-origin";
    # WebSocket for HMR in dev (harmless in prod)
    nginx.ingress.kubernetes.io/proxy-http-version: '1.1'
    nginx.ingress.kubernetes.io/proxy-read-timeout: '60'
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - hireadda.in
        - www.hireadda.in
        - mta-sts.hireadda.in
      secretName: frontend-hireadda-tls
  rules:
    - host: hireadda.in
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend
                port:
                  number: 3000
    - host: www.hireadda.in
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend
                port:
                  number: 3000
    # MTA-STS policy host — serves /.well-known/mta-sts.txt
    - host: mta-sts.hireadda.in
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend
                port:
                  number: 3000
---
# ── OTel Ingress (browser traces → nginx → otel-collector) ──
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: otel-ingress
  namespace: hire-adda
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/ssl-redirect: 'true'
    nginx.ingress.kubernetes.io/proxy-body-size: '64k'
    # Rate limit browser traces (2 req/s per IP)
    nginx.ingress.kubernetes.io/limit-rps: '2'
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - hireadda.in
      secretName: frontend-hireadda-tls
  rules:
    - host: hireadda.in
      http:
        paths:
          - path: /otel/
            pathType: Prefix
            backend:
              service:
                name: nginx
                port:
                  number: 80
---
