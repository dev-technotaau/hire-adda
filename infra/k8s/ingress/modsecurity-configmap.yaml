# ============================================================
# ModSecurity WAF — Custom Rules (REFERENCE ONLY)
# ============================================================
# NOTE: This ConfigMap is NOT used by nginx-ingress globally.
# The real global ModSecurity rules live in the main
# `ingress-nginx-controller` ConfigMap under the key
# `modsecurity-snippet`, which is set by Helm in
# `infra/ansible/playbooks/03-post-install.yml`.
#
# This file is kept as a template/reference for the custom rules
# we'd want to inject. If you change it, also update the Helm
# --set-string 'controller.config.modsecurity-snippet=...' in
# 03-post-install.yml, or patch the live ConfigMap with:
#   kubectl patch configmap ingress-nginx-controller -n ingress-nginx
# ============================================================
apiVersion: v1
kind: ConfigMap
metadata:
  name: modsecurity-custom-rules
  namespace: ingress-nginx
data:
  modsecurity.conf: |
    # Enable ModSecurity
    SecRuleEngine On

    # Request body access (required for POST inspection)
    SecRequestBodyAccess On
    SecRequestBodyLimit 10485760
    SecRequestBodyNoFilesLimit 131072

    # Response body (disable for performance)
    SecResponseBodyAccess Off

    # Audit logging — only log relevant events
    SecAuditEngine RelevantOnly
    SecAuditLogRelevantStatus "^(?:5|4(?!04))"
    SecAuditLogType Serial
    SecAuditLog /var/log/modsecurity/audit.log

    # ── Whitelist known API patterns ──
    # Allow JSON content type for API
    SecRule REQUEST_HEADERS:Content-Type "application/json" \
      "id:1000,phase:1,pass,nolog,ctl:requestBodyProcessor=JSON"

    # Whitelist health check endpoints from scanning
    SecRule REQUEST_URI "^/health" \
      "id:1001,phase:1,pass,nolog,ctl:ruleEngine=Off"

    # Whitelist metrics endpoint
    SecRule REQUEST_URI "^/metrics" \
      "id:1002,phase:1,pass,nolog,ctl:ruleEngine=Off"

    # Whitelist WebSocket upgrade requests
    SecRule REQUEST_HEADERS:Upgrade "websocket" \
      "id:1003,phase:1,pass,nolog,ctl:ruleEngine=Off"

    # Whitelist authenticated API routes (BFF proxy + direct API)
    # These routes have their own auth, CSRF, and Zod validation layers.
    # OWASP CRS false-positives on legitimate JSON payloads (URLs, rich text,
    # long strings) cause false 403s on profile updates, job posts, etc.
    SecRule REQUEST_URI "^/api/(proxy|v1)/" \
      "id:1004,phase:1,pass,nolog,ctl:ruleEngine=DetectionOnly"

    # ── Bot Protection ──
    # Block common vulnerability scanners
    SecRule REQUEST_HEADERS:User-Agent "@pmFromFile /etc/modsecurity/bad-bots.data" \
      "id:2000,phase:1,deny,status:403,msg:'Bad bot detected'"

    # Block requests without User-Agent (common for bots)
    SecRule &REQUEST_HEADERS:User-Agent "@eq 0" \
      "id:2001,phase:1,deny,status:403,msg:'Missing User-Agent header'"

    # ── Path Traversal Protection ──
    SecRule REQUEST_URI "\.\./" \
      "id:3000,phase:1,deny,status:403,msg:'Path traversal attempt'"

    # ── SQL Injection Basics (OWASP CRS handles most) ──
    SecRule ARGS "@rx (?i)(union\s+select|drop\s+table|insert\s+into|delete\s+from)" \
      "id:4000,phase:2,deny,status:403,msg:'SQL injection attempt'"

  bad-bots.data: |
    nikto
    sqlmap
    nmap
    masscan
    zgrab
    nuclei
    dirbuster
    gobuster
    wpscan
    jorgee
    python-requests/2
    Go-http-client
    curl/7
