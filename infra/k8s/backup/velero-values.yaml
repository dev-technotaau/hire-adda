# ============================================================
# Velero Helm Values — Backup & Disaster Recovery
# Uses Cloudflare R2 as S3-compatible backup target
# ============================================================
# Install:
#   helm install velero vmware-tanzu/velero \
#     --namespace velero -f velero-values.yaml
# ============================================================

# ── Backup Storage (Cloudflare R2) ──
configuration:
  backupStorageLocation:
    - name: default
      provider: aws
      bucket: hire-adda-velero-backups
      config:
        region: auto
        s3Url: https://c6027029a4faaf83fb46084c06d9762b.r2.cloudflarestorage.com
        s3ForcePathStyle: 'true'
  # No volume snapshot — using file-level backup via Kopia
  volumeSnapshotLocation: []
  defaultVolumesToFsBackup: true
  uploaderType: kopia

# ── Credentials ──
# R2 credentials stored in SealedSecret (velero-r2-credentials)
# The sealed secret creates a k8s secret named "velero-r2-credentials"
# with key "cloud" containing AWS-format credentials for R2.
credentials:
  useSecret: true
  existingSecret: velero-r2-credentials

# ── Resources ──
resources:
  requests:
    memory: '128Mi'
    cpu: '50m'
  limits:
    memory: '256Mi'
    cpu: '250m'

# ── Node Agent (for file-level PV backups) ──
deployNodeAgent: true
nodeAgent:
  resources:
    requests:
      memory: '64Mi'
      cpu: '25m'
    limits:
      memory: '256Mi'
      cpu: '250m'

# ── Schedules (defined separately in backup-schedule.yaml) ──
schedules: {}

# ── Init Containers ──
initContainers:
  - name: velero-plugin-for-aws
    image: velero/velero-plugin-for-aws:v1.10.0
    volumeMounts:
      - mountPath: /target
        name: plugins
