# ============================================================
# Velero Backup Repository Config — Aggressive Kopia Maintenance
# ============================================================
# Overrides default Kopia maintenance intervals so deleted-snapshot
# blocks get reclaimed from R2 faster (every 6h instead of 24h).
# Referenced by velero-values.yaml -> configuration.backupRepoConfigMap
# ============================================================
apiVersion: v1
kind: ConfigMap
metadata:
  name: velero-repo-config
  namespace: velero
  labels:
    app.kubernetes.io/name: velero
    app.kubernetes.io/component: repo-config
data:
  # JSON config — one entry per repository type + namespace combination
  hire-adda-default-kopia: |
    {
      "fullMaintenanceIntervalHours": 6,
      "cacheLimitMB": 2048
    }
