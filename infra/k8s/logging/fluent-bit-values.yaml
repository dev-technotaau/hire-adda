# ============================================================
# Fluent Bit Helm Values
# Lightweight log collector — sends to existing OpenSearch
# ============================================================
# Install:
#   helm install fluent-bit fluent/fluent-bit \
#     --namespace logging -f fluent-bit-values.yaml
# ============================================================

resources:
  requests:
    memory: '32Mi'
    cpu: '50m'
  limits:
    memory: '64Mi'
    cpu: '100m'

config:
  service: |
    [SERVICE]
        Daemon        Off
        Flush         5
        Log_Level     warn
        Parsers_File  /fluent-bit/etc/parsers.conf
        HTTP_Server   On
        HTTP_Listen   0.0.0.0
        HTTP_Port     2020
        Health_Check  On

  inputs: |
    [INPUT]
        Name              tail
        Tag               kube.*
        Path              /var/log/containers/*.log
        Parser            cri
        DB                /var/log/flb_kube.db
        Mem_Buf_Limit     5MB
        Skip_Long_Lines   On
        Refresh_Interval  10

  filters: |
    [FILTER]
        Name                kubernetes
        Match               kube.*
        Kube_URL            https://kubernetes.default.svc:443
        Kube_CA_File        /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
        Kube_Token_File     /var/run/secrets/kubernetes.io/serviceaccount/token
        Kube_Tag_Prefix     kube.var.log.containers.
        Merge_Log           On
        Keep_Log            Off
        K8S-Logging.Parser  On
        K8S-Logging.Exclude Off
        Labels              On
        Annotations         Off

    [FILTER]
        Name    modify
        Match   kube.*
        Add     cluster hireadda-production
        Add     environment production

    [FILTER]
        Name    grep
        Match   kube.*
        Exclude $kubernetes['namespace_name'] kube-system

  outputs: |
    [OUTPUT]
        Name            opensearch
        Match           kube.*
        Host            opensearch.talent-bridge.svc.cluster.local
        Port            9200
        Index           logs-talent-bridge
        Type            _doc
        Logstash_Format On
        Logstash_Prefix logs-talent-bridge
        Suppress_Type_Name On
        Retry_Limit     3
        tls             Off
        Replace_Dots    On
        Trace_Error     On

# Tolerations for running on all nodes (DaemonSet)
tolerations:
  - operator: Exists

# Volume mounts for log collection
volumeMounts:
  - name: varlog
    mountPath: /var/log
    readOnly: true
  - name: varlibdockercontainers
    mountPath: /var/lib/docker/containers
    readOnly: true
  - name: runlog
    mountPath: /run/log
    readOnly: true

volumes:
  - name: varlog
    hostPath:
      path: /var/log
  - name: varlibdockercontainers
    hostPath:
      path: /var/lib/docker/containers
  - name: runlog
    hostPath:
      path: /run/log
