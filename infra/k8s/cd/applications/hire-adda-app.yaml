# ── Mail TLS (cert-manager Certificate + host sync CronJob) ──
# Certificate is issued via DNS-01 (Cloudflare) into a K8s Secret;
# CronJob mirrors the Secret onto the host so docker-mailserver
# (running outside K8s) picks up renewals automatically.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: hire-adda-mail-tls
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/dev-technotaau/hire-adda.git
    targetRevision: main
    path: infra/k8s/mail-tls
    directory:
      recurse: true
  destination:
    server: https://kubernetes.default.svc
    namespace: mail-tls
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=false
    retry:
      limit: 3
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
---
