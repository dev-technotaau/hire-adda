  name: hire-adda-ingress
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/dev-technotaau/hire-adda.git
    targetRevision: main
    path: infra/k8s/ingress
    directory:
      recurse: true
  destination:
    server: https://kubernetes.default.svc
    # No namespace — resources define their own (hire-adda, ingress-nginx, cluster-scoped)
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=false
    retry:
      limit: 3
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
