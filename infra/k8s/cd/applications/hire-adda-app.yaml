# ============================================================
# ArgoCD Applications — Hire Adda
# Watches the Git repo and auto-syncs K8s manifests
# ============================================================

# ── Main application (backend, frontend, databases, cronjobs) ──
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: hire-adda
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/dev-technotaau/hire-adda.git
    targetRevision: main
    path: infra/k8s/apps
    directory:
      recurse: true
  destination:
    server: https://kubernetes.default.svc
    namespace: hire-adda
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: false
    syncOptions:
      - CreateNamespace=false
      - PrunePropagationPolicy=foreground
      - PruneLast=true
    retry:
      limit: 3
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
  ignoreDifferences:
    - group: apps
      kind: Deployment
      jsonPointers:
        - /spec/replicas # HPA manages replicas + deploy-k8s.sh scales to 0
    - group: ''
      kind: Service
      name: backend-canary
      jsonPointers:
        - /spec/selector # Argo Rollouts manages during canary
    - group: ''
      kind: Service
      name: backend-preview
      jsonPointers:
        - /spec/selector # Argo Rollouts manages during blue-green
    - group: ''
      kind: Service
      name: frontend-canary
      jsonPointers:
        - /spec/selector # Argo Rollouts manages during canary
    - group: ''
      kind: Service
      name: frontend-preview
      jsonPointers:
        - /spec/selector # Argo Rollouts manages during blue-green
---
# ── Monitoring stack (alerting rules, service monitors) ──
# NOTE: Dashboard ConfigMaps are created by Ansible from JSON files (not ArgoCD)
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: hire-adda-monitoring
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/dev-technotaau/hire-adda.git
    targetRevision: main
    path: infra/k8s/monitoring
    directory:
      recurse: true
      # Exclude Helm values and raw Grafana JSON (not K8s resources)
      exclude: '{*-values.yaml,grafana-dashboards/*.json}'
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=false
    retry:
      limit: 3
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
---
