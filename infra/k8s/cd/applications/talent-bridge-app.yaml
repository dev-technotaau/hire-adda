# ============================================================
# ArgoCD Application — Talent Bridge
# Watches the Git repo and auto-syncs K8s manifests
# ============================================================
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: talent-bridge
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    # Update with your actual repo URL
    repoURL: https://github.com/OWNER/talent_bridge.git
    targetRevision: main
    path: infra/k8s/apps
    directory:
      recurse: true
  destination:
    server: https://kubernetes.default.svc
    namespace: talent-bridge
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: false
    syncOptions:
      - CreateNamespace=false
      - PrunePropagationPolicy=foreground
      - PruneLast=true
    retry:
      limit: 3
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
  # Health checks
  ignoreDifferences:
    - group: apps
      kind: Deployment
      jsonPointers:
        - /spec/replicas # HPA manages replicas
---
# Monitoring stack application
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: talent-bridge-monitoring
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/OWNER/talent_bridge.git
    targetRevision: main
    path: infra/k8s/monitoring
    directory:
      recurse: true
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
---
# Security policies application
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: talent-bridge-security
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/OWNER/talent_bridge.git
    targetRevision: main
    path: infra/k8s/security
    directory:
      recurse: true
  destination:
    server: https://kubernetes.default.svc
    namespace: talent-bridge
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
