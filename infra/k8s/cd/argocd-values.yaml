# ============================================================
# ArgoCD Helm Values — Minimal for Single-Node K3s
# GitOps continuous deployment
# ============================================================
# Install:
#   helm install argocd argo/argo-cd \
#     --namespace argocd -f argocd-values.yaml
# ============================================================

# ── Server ──
server:
  replicas: 1
  resources:
    requests:
      memory: '128Mi'
      cpu: '50m'
    limits:
      memory: '256Mi'
      cpu: '250m'
  ingress:
    enabled: true
    ingressClassName: nginx
    annotations:
      cert-manager.io/cluster-issuer: letsencrypt-prod
      nginx.ingress.kubernetes.io/ssl-redirect: 'true'
      nginx.ingress.kubernetes.io/backend-protocol: 'HTTPS'
    hosts:
      - argocd.hireadda.in
    tls:
      - secretName: argocd-tls
        hosts:
          - argocd.hireadda.in
  extraArgs:
    - --insecure # TLS terminated at ingress

# ── Controller ──
controller:
  replicas: 1
  enableStatefulSet: false # HA mode disabled (single node)
  resources:
    requests:
      memory: '256Mi'
      cpu: '50m'
    limits:
      memory: '1Gi'
      cpu: '500m'

# ── Repo Server ──
repoServer:
  replicas: 1
  resources:
    requests:
      memory: '64Mi'
      cpu: '25m'
    limits:
      memory: '128Mi'
      cpu: '150m'

# ── Internal Redis (ArgoCD's cache) ──
redis:
  resources:
    requests:
      memory: '32Mi'
      cpu: '10m'
    limits:
      memory: '64Mi'
      cpu: '100m'

# ── Application Set Controller ──
applicationSet:
  resources:
    requests:
      memory: '32Mi'
      cpu: '10m'
    limits:
      memory: '64Mi'
      cpu: '100m'

# ── Notifications Controller ──
notifications:
  enabled: false # Enable later if needed

# ── Dex (SSO) ──
dex:
  enabled: false # Use admin password for now

