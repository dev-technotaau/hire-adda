# ============================================================
# Argo Rollouts — Canary Deployment Strategy for Backend
# Replaces the Deployment when Argo Rollouts is installed
# ============================================================
# Install Argo Rollouts:
#   helm install argo-rollouts argo/argo-rollouts \
#     --namespace argo-rollouts --create-namespace \
#     --set controller.resources.limits.memory=128Mi
# ============================================================
# NOTE: This is an ALTERNATIVE to apps/backend/deployment.yaml.
# Use ONE or the other, not both.
# To switch: delete the Deployment, apply this Rollout.
# ============================================================
apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: backend
  namespace: talent-bridge
  labels:
    app: backend
    tier: app
spec:
  replicas: 1
  revisionHistoryLimit: 5
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
        tier: app
    spec:
      serviceAccountName: backend-sa
      securityContext:
        runAsUser: 1001
        runAsGroup: 1001
        fsGroup: 1001
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: backend
          image: ghcr.io/OWNER/talent-bridge-backend:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 5000
          envFrom:
            - secretRef:
                name: backend-secrets
            - configMapRef:
                name: backend-config
          resources:
            requests:
              memory: '512Mi'
              cpu: '250m'
            limits:
              memory: '1Gi'
              cpu: '1000m'
          livenessProbe:
            httpGet:
              path: /health/live
              port: 5000
            initialDelaySeconds: 10
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health/ready
              port: 5000
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          startupProbe:
            httpGet:
              path: /health/live
              port: 5000
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 30
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: uploads
              mountPath: /app/uploads
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: uploads
          persistentVolumeClaim:
            claimName: uploads-pvc
        - name: tmp
          emptyDir:
            sizeLimit: 256Mi
      imagePullSecrets:
        - name: ghcr-credentials
      terminationGracePeriodSeconds: 30
  strategy:
    canary:
      # Canary deployment steps
      steps:
        - setWeight: 20
        - pause: { duration: 60s }
        - setWeight: 50
        - pause: { duration: 120s }
        - setWeight: 100
      # Analysis (optional — add AnalysisTemplate for automated rollback)
      # analysisTemplate:
      #   - templateName: backend-success-rate
      maxSurge: 1
      maxUnavailable: 0
