# ============================================================
# Argo Rollouts — Blue-Green Deployment Strategy for Frontend
# Instant traffic swap after preview verification
# ============================================================
# Usage: Applied by deploy-k8s.sh --strategy blue-green
# Replaces the canary Rollout when blue-green is requested.
# ============================================================
apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: frontend
  namespace: hire-adda
  labels:
    app: frontend
    tier: app
spec:
  replicas: 1
  revisionHistoryLimit: 5
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
        tier: app
    spec:
      securityContext:
        runAsUser: 1001
        runAsGroup: 1001
        fsGroup: 1001
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: frontend
          image: ghcr.io/dev-technotaau/hire-adda-frontend:a0486cdb884dcdc4e49fe05afbd6428e47f8b1e6
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 3000
              protocol: TCP
          env:
            - name: NODE_ENV
              value: 'production'
            - name: BACKEND_INTERNAL_URL
              value: 'http://nginx:80/api/v1'
            - name: BFF_SECRET
              valueFrom:
                secretKeyRef:
                  name: backend-secrets
                  key: BFF_SECRET
            - name: COOKIE_ACCESS_MAX_AGE_DAYS
              value: '7'
            - name: COOKIE_REFRESH_MAX_AGE_DAYS
              value: '30'
            - name: OTEL_ENABLED
              value: 'true'
            - name: OTEL_SERVICE_NAME
              value: 'hire-adda-frontend'
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: 'http://otel-collector.monitoring.svc.cluster.local:4318/v1/traces'
          resources:
            requests:
              memory: '256Mi'
              cpu: '100m'
            limits:
              memory: '512Mi'
              cpu: '500m'
          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir:
            sizeLimit: 128Mi
      imagePullSecrets:
        - name: ghcr-credentials
      terminationGracePeriodSeconds: 15
  strategy:
    blueGreen:
      activeService: frontend
      previewService: frontend-preview
      autoPromotionEnabled: false
      prePromotionAnalysis:
        templates:
          - templateName: frontend-success-rate
      scaleDownDelaySeconds: 30
