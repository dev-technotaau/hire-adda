# ============================================================
# Chaos Engineering — Service Disruption Tests
# Tests graceful degradation when dependencies fail
# SUSPENDED by default — run manually
# ============================================================
apiVersion: batch/v1
kind: CronJob
metadata:
  name: chaos-redis-kill
  namespace: talent-bridge
  labels:
    app: chaos-engineering
spec:
  schedule: '0 14 * * 3' # Wednesday 2PM UTC
  suspend: true
  concurrencyPolicy: Forbid
  jobTemplate:
    spec:
      backoffLimit: 0
      activeDeadlineSeconds: 120
      template:
        metadata:
          labels:
            app: chaos-engineering
        spec:
          serviceAccountName: chaos-runner
          securityContext:
            runAsUser: 1001
            runAsNonRoot: true
            seccompProfile:
              type: RuntimeDefault
          containers:
            - name: chaos
              image: bitnami/kubectl:1.31
              command:
                - /bin/sh
                - -c
                - |
                  echo "=== Chaos: Redis Disruption Test ==="
                  echo "Testing backend graceful degradation without Redis"

                  # Delete Redis pod
                  kubectl delete pod redis-0 -n talent-bridge --grace-period=5
                  echo "Redis pod deleted at $(date -u)"

                  # Wait for backend health check to report degraded
                  sleep 10
                  echo "Checking backend health (should be degraded but alive)..."
                  kubectl exec deploy/backend -n talent-bridge -- \
                    wget -qO- http://localhost:5000/health/live || echo "Backend liveness: FAILED"
                  kubectl exec deploy/backend -n talent-bridge -- \
                    wget -qO- http://localhost:5000/health/ready || echo "Backend readiness: NOT READY (expected)"

                  # Wait for Redis to auto-restart
                  echo "Waiting for Redis to auto-restart..."
                  kubectl wait --for=condition=ready pod/redis-0 -n talent-bridge --timeout=120s

                  # Verify recovery
                  sleep 5
                  echo "Checking backend recovery..."
                  kubectl exec deploy/backend -n talent-bridge -- \
                    wget -qO- http://localhost:5000/health/ready && echo "Backend recovered!" || echo "Backend still not ready"

                  echo "=== Experiment Complete ==="
              resources:
                requests:
                  memory: '16Mi'
                  cpu: '10m'
                limits:
                  memory: '32Mi'
                  cpu: '50m'
              securityContext:
                allowPrivilegeEscalation: false
                readOnlyRootFilesystem: true
                capabilities:
                  drop:
                    - ALL
          restartPolicy: Never
