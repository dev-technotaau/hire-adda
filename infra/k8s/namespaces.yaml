# ============================================================
# Kubernetes Namespaces for Hire Adda
# ============================================================
apiVersion: v1
kind: Namespace
metadata:
  name: hire-adda
  labels:
    app.kubernetes.io/part-of: hire-adda
    # `enforce: baseline` because nginx (binds 80/443) and roundcube need
    # CHOWN/SETGID/SETUID + root, which `restricted` forbids. Audit/warn
    # remain at restricted so we still get visibility into policy gaps.
    pod-security.kubernetes.io/enforce: baseline
    pod-security.kubernetes.io/audit: restricted
    pod-security.kubernetes.io/warn: restricted
---
apiVersion: v1
kind: Namespace
metadata:
  name: monitoring
  labels:
    app.kubernetes.io/part-of: hire-adda
    # `privileged` because node-exporter (DaemonSet) needs hostNetwork
    # + hostPID + hostPath. audit/warn stay at baseline so deviations
    # in non-system pods still surface in the audit log.
    pod-security.kubernetes.io/enforce: privileged
    pod-security.kubernetes.io/audit: baseline
    pod-security.kubernetes.io/warn: baseline
---
apiVersion: v1
kind: Namespace
metadata:
  name: logging
  labels:
    app.kubernetes.io/part-of: hire-adda
    # `privileged` because fluent-bit (DaemonSet) tails
    # /var/log/containers via hostPath — `baseline` forbids hostPath.
    pod-security.kubernetes.io/enforce: privileged
    pod-security.kubernetes.io/audit: baseline
    pod-security.kubernetes.io/warn: baseline
---
apiVersion: v1
kind: Namespace
metadata:
  name: argocd
  labels:
    app.kubernetes.io/part-of: hire-adda
---
apiVersion: v1
kind: Namespace
metadata:
  name: velero
  labels:
    app.kubernetes.io/part-of: hire-adda
