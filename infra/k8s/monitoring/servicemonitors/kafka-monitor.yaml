# ============================================================
# Kafka — ServiceMonitor (via kafka_exporter sidecar)
# ============================================================
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: kafka-monitor
  namespace: monitoring
  labels:
    app: kafka
    release: kube-prometheus
spec:
  namespaceSelector:
    matchNames:
      - talent-bridge
  selector:
    matchLabels:
      app: kafka
  endpoints:
    - port: metrics
      path: /metrics
      interval: 30s
      scrapeTimeout: 10s
