# ============================================================
# Backend API — ServiceMonitor
# Scrapes /metrics from the backend Express app
# Requires prom-client package in backend
# ============================================================
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: backend-monitor
  namespace: monitoring
  labels:
    app: backend
    release: kube-prometheus
spec:
  namespaceSelector:
    matchNames:
      - talent-bridge
  selector:
    matchLabels:
      app: backend
  endpoints:
    - port: http
      path: /metrics
      interval: 30s
      scrapeTimeout: 10s
