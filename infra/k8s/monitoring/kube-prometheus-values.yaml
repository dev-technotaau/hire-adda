# ============================================================
# kube-prometheus-stack Helm Values
# Prometheus + Grafana + AlertManager + Node Exporter
# Optimized for 16GB single-node VPS
# ============================================================
# Install:
#   helm install kube-prometheus prometheus-community/kube-prometheus-stack \
#     --namespace monitoring -f kube-prometheus-values.yaml
# ============================================================

# ── Prometheus ──
prometheus:
  prometheusSpec:
    retention: 15d
    retentionSize: '15GB'
    scrapeInterval: 30s
    evaluationInterval: 30s
    resources:
      requests:
        memory: '256Mi'
        cpu: '100m'
      limits:
        memory: '512Mi'
        cpu: '500m'
    storageSpec:
      volumeClaimTemplate:
        spec:
          storageClassName: local-path
          accessModes: ['ReadWriteOnce']
          resources:
            requests:
              storage: 20Gi
    # Only monitor our namespaces
    serviceMonitorNamespaceSelector:
      matchLabels:
        app.kubernetes.io/part-of: talent-bridge
    podMonitorNamespaceSelector:
      matchLabels:
        app.kubernetes.io/part-of: talent-bridge
    ruleNamespaceSelector:
      matchLabels:
        app.kubernetes.io/part-of: talent-bridge

# ── AlertManager ──
alertmanager:
  alertmanagerSpec:
    resources:
      requests:
        memory: '32Mi'
        cpu: '10m'
      limits:
        memory: '64Mi'
        cpu: '100m'
    storage:
      volumeClaimTemplate:
        spec:
          storageClassName: local-path
          accessModes: ['ReadWriteOnce']
          resources:
            requests:
              storage: 1Gi
  # Configure alert routing (customize email/Slack/webhook)
  config:
    global:
      resolve_timeout: 5m
    route:
      group_by: ['alertname', 'namespace']
      group_wait: 30s
      group_interval: 5m
      repeat_interval: 4h
      receiver: 'default'
      routes:
        - match:
            severity: critical
          receiver: 'critical'
          repeat_interval: 1h
    receivers:
      - name: 'default'
        # Configure your notification channels here:
        # webhook_configs:
        #   - url: 'https://api.hireadda.in/webhooks/alertmanager'
      - name: 'critical'
        # webhook_configs:
        #   - url: 'https://api.hireadda.in/webhooks/alertmanager'

# ── Grafana ──
grafana:
  adminPassword: 'CHANGE_ME_ON_FIRST_LOGIN'
  resources:
    requests:
      memory: '128Mi'
      cpu: '50m'
    limits:
      memory: '256Mi'
      cpu: '250m'
  persistence:
    enabled: true
    storageClassName: local-path
    size: 5Gi
  ingress:
    enabled: true
    ingressClassName: nginx
    annotations:
      cert-manager.io/cluster-issuer: letsencrypt-prod
      nginx.ingress.kubernetes.io/ssl-redirect: 'true'
    hosts:
      - grafana.hireadda.in
    tls:
      - secretName: grafana-tls
        hosts:
          - grafana.hireadda.in
  # Sidecar for loading dashboards from ConfigMaps
  sidecar:
    dashboards:
      enabled: true
      searchNamespace: monitoring
      label: grafana_dashboard
      folderAnnotation: grafana_folder
      provider:
        foldersFromFilesStructure: true
  # Default data source
  datasources:
    datasources.yaml:
      apiVersion: 1
      datasources:
        - name: Prometheus
          type: prometheus
          url: http://kube-prometheus-prometheus.monitoring:9090
          access: proxy
          isDefault: true

# ── Node Exporter ──
nodeExporter:
  resources:
    requests:
      memory: '32Mi'
      cpu: '10m'
    limits:
      memory: '64Mi'
      cpu: '100m'

# ── kube-state-metrics ──
kubeStateMetrics:
  resources:
    requests:
      memory: '32Mi'
      cpu: '10m'
    limits:
      memory: '64Mi'
      cpu: '100m'

# ── Prometheus Operator ──
prometheusOperator:
  resources:
    requests:
      memory: '64Mi'
      cpu: '50m'
    limits:
      memory: '128Mi'
      cpu: '200m'

# Disable components not needed on single node
kubeControllerManager:
  enabled: false
kubeScheduler:
  enabled: false
kubeProxy:
  enabled: false
kubeEtcd:
  enabled: false
