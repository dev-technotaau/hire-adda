# ============================================================
# kube-prometheus-stack Helm Values
# Prometheus + Grafana + AlertManager + Node Exporter
# Optimized for 16GB single-node VPS
# ============================================================
# Install:
#   helm install kube-prometheus prometheus-community/kube-prometheus-stack \
#     --namespace monitoring -f kube-prometheus-values.yaml
# ============================================================

# ── Prometheus ──
prometheus:
  prometheusSpec:
    retention: 15d
    retentionSize: '15GB'
    scrapeInterval: 30s
    evaluationInterval: 30s
    # Accept remote_write from Tempo metrics generator
    enableRemoteWriteReceiver: true
    resources:
      requests:
        memory: '256Mi'
        cpu: '100m'
      limits:
        memory: '512Mi'
        cpu: '500m'
    storageSpec:
      volumeClaimTemplate:
        spec:
          storageClassName: local-path
          accessModes: ['ReadWriteOnce']
          resources:
            requests:
              storage: 20Gi
    # Only monitor our namespaces
    serviceMonitorNamespaceSelector:
      matchLabels:
        app.kubernetes.io/part-of: hire-adda
    podMonitorNamespaceSelector:
      matchLabels:
        app.kubernetes.io/part-of: hire-adda
    ruleNamespaceSelector:
      matchLabels:
        app.kubernetes.io/part-of: hire-adda

# ── AlertManager ──
alertmanager:
  alertmanagerSpec:
    resources:
      requests:
        memory: '32Mi'
        cpu: '10m'
      limits:
        memory: '64Mi'
        cpu: '100m'
    storage:
      volumeClaimTemplate:
        spec:
          storageClassName: local-path
          accessModes: ['ReadWriteOnce']
          resources:
            requests:
              storage: 1Gi
  # Configure alert routing (customize email/Slack/webhook)
  config:
    global:
      resolve_timeout: 5m
    route:
      group_by: ['alertname', 'namespace']
      group_wait: 30s
      group_interval: 5m
      repeat_interval: 4h
      receiver: 'default'
      routes:
        - match:
            severity: critical
          receiver: 'critical'
          repeat_interval: 1h
    receivers:
      - name: 'default'
        webhook_configs:
          - url: 'http://backend.hire-adda.svc.cluster.local:5000/api/v1/internal/alertmanager'
            send_resolved: true
        slack_configs:
          # Slack
          - api_url_file: '/etc/alertmanager/secrets/alertmanager-slack/slack-webhook-url'
            channel: '#alerts'
            send_resolved: true
            title: '{{ .Status | toUpper }}: {{ .CommonLabels.alertname }}'
            text: '{{ range .Alerts }}{{ .Annotations.summary }}{{ "\n" }}{{ end }}'
          # Discord (Slack-compatible — secret value should be Discord webhook URL + /slack suffix)
          - api_url_file: '/etc/alertmanager/secrets/alertmanager-slack/discord-webhook-url'
            send_resolved: true
            title: '{{ .Status | toUpper }}: {{ .CommonLabels.alertname }}'
            text: '{{ range .Alerts }}{{ .Annotations.summary }}{{ "\n" }}{{ end }}'
      - name: 'critical'
        webhook_configs:
          - url: 'http://backend.hire-adda.svc.cluster.local:5000/api/v1/internal/alertmanager'
            send_resolved: true
        slack_configs:
          # Slack
          - api_url_file: '/etc/alertmanager/secrets/alertmanager-slack/slack-webhook-url-critical'
            channel: '#alerts-critical'
            send_resolved: true
            title: 'CRITICAL: {{ .CommonLabels.alertname }}'
            text: '{{ range .Alerts }}{{ .Annotations.summary }}{{ "\n" }}{{ end }}'
          # Discord (Slack-compatible — secret value should be Discord webhook URL + /slack suffix)
          - api_url_file: '/etc/alertmanager/secrets/alertmanager-slack/discord-webhook-url'
            send_resolved: true
            title: 'CRITICAL: {{ .CommonLabels.alertname }}'
            text: '{{ range .Alerts }}{{ .Annotations.summary }}{{ "\n" }}{{ end }}'
        email_configs:
          - to: 'info.hireadda@gmail.com'
            from: 'Hire Adda <noreply@hireadda.in>'
            smarthost: 'mail.hireadda.in:587'
            auth_username: 'noreply@hireadda.in'
            auth_password_file: '/etc/alertmanager/secrets/alertmanager-smtp/smtp-password'
            headers:
              Reply-To: 'support@hireadda.in'
            require_tls: true
            send_resolved: true

# ── Grafana ──
grafana:
  adminPassword: 'Hire@2026/2002'
  resources:
    requests:
      memory: '128Mi'
      cpu: '50m'
    limits:
      memory: '256Mi'
      cpu: '250m'
  persistence:
    enabled: true
    storageClassName: local-path
    size: 5Gi
  ingress:
    enabled: true
    ingressClassName: nginx
    annotations:
      cert-manager.io/cluster-issuer: letsencrypt-prod
      nginx.ingress.kubernetes.io/ssl-redirect: 'true'
    hosts:
      - grafana.hireadda.in
    tls:
      - secretName: grafana-tls
        hosts:
          - grafana.hireadda.in
  # Sidecar for loading dashboards from ConfigMaps
  sidecar:
    dashboards:
      enabled: true
      searchNamespace: monitoring
      label: grafana_dashboard
      folderAnnotation: grafana_folder
      provider:
        foldersFromFilesStructure: true
  # Data sources (Prometheus + Tempo + Loki — matches Docker Compose)
  datasources:
    datasources.yaml:
      apiVersion: 1
      datasources:
        - name: Prometheus
          type: prometheus
          url: http://kube-prometheus-stack-prometheus.monitoring:9090
          access: proxy
          isDefault: true
        - name: Tempo
          type: tempo
          url: http://tempo.monitoring:3200
          access: proxy
          jsonData:
            tracesToMetrics:
              datasourceUid: prometheus
            tracesToLogs:
              datasourceUid: loki
            serviceMap:
              datasourceUid: prometheus
            nodeGraph:
              enabled: true
        - name: Loki
          type: loki
          uid: loki
          url: http://loki.logging:3100
          access: proxy
          jsonData:
            derivedFields:
              - datasourceUid: tempo
                matcherRegex: '"traceId":"(\w+)"'
                name: TraceID
                url: '$${__value.raw}'

# ── Node Exporter ──
nodeExporter:
  resources:
    requests:
      memory: '32Mi'
      cpu: '10m'
    limits:
      memory: '64Mi'
      cpu: '100m'

# ── kube-state-metrics ──
kubeStateMetrics:
  resources:
    requests:
      memory: '32Mi'
      cpu: '10m'
    limits:
      memory: '64Mi'
      cpu: '100m'

# ── Prometheus Operator ──
prometheusOperator:
  resources:
    requests:
      memory: '64Mi'
      cpu: '50m'
    limits:
      memory: '128Mi'
      cpu: '200m'

# Disable components not needed on single node
kubeControllerManager:
  enabled: false
kubeScheduler:
  enabled: false
kubeProxy:
  enabled: false
kubeEtcd:
  enabled: false
