# ============================================================
# SealedSecret — Cloudflare API Token (DNS-01 ACME challenge)
# ============================================================
# Used by `letsencrypt-prod-dns` ClusterIssuer to create the
# `_acme-challenge.<host>` TXT records that Let's Encrypt reads
# during the DNS-01 ACME challenge.
#
# Token scope (from Cloudflare API token edit page):
#   Permissions:
#     - Zone:Zone:Read
#     - Zone:DNS:Edit
#   Zone Resources:
#     - Include / Specific zone / hireadda.in
#
# Regenerate (e.g. after token rotation):
#   TOKEN="cfut_..."
#   printf "%s" "$TOKEN" | kubectl create secret generic cf-api-token-secret \
#     --namespace=cert-manager \
#     --from-file=api-token=/dev/stdin \
#     --dry-run=client -o yaml \
#   | kubeseal \
#       --controller-name sealed-secrets \
#       --controller-namespace kube-system \
#       --format=yaml
# ============================================================
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: cf-api-token-secret
  namespace: cert-manager
  labels:
    app.kubernetes.io/name: cf-api-token-secret
    app.kubernetes.io/component: dns-01-solver
    app.kubernetes.io/part-of: hire-adda
spec:
  encryptedData:
    api-token: 
  template:
    metadata:
      name: cf-api-token-secret
      namespace: cert-manager
      labels:
        app.kubernetes.io/name: cf-api-token-secret
        app.kubernetes.io/component: dns-01-solver
        app.kubernetes.io/part-of: hire-adda
    type: Opaque
