# ============================================================
# SealedSecret — AlertManager Notification Secrets
# ============================================================
# Contains secrets for Slack, Discord, and SMTP email receivers.
# Regenerate: kubeseal on VPS with --controller-name sealed-secrets-controller
# ============================================================
# Secret 1: alertmanager-slack (Slack + Discord webhook URLs)
# Secret 2: alertmanager-smtp  (SMTP password for email alerts)
# ============================================================
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: alertmanager-slack
  namespace: monitoring
  labels:
    app: alertmanager
    app.kubernetes.io/name: alertmanager
    app.kubernetes.io/component: alerting
    app.kubernetes.io/part-of: hire-adda
spec:
  encryptedData:
    slack-webhook-url: 
    slack-webhook-url-critical: 
    discord-webhook-url: 
  template:
    metadata:
      name: alertmanager-slack
      namespace: monitoring
      labels:
        app: alertmanager
        app.kubernetes.io/name: alertmanager
        app.kubernetes.io/component: alerting
        app.kubernetes.io/part-of: hire-adda
    type: Opaque
---
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: alertmanager-smtp
  namespace: monitoring
  labels:
    app: alertmanager
    app.kubernetes.io/name: alertmanager
    app.kubernetes.io/component: alerting
    app.kubernetes.io/part-of: hire-adda
spec:
  encryptedData:
    smtp-password: 
  template:
    metadata:
      name: alertmanager-smtp
      namespace: monitoring
      labels:
        app: alertmanager
        app.kubernetes.io/name: alertmanager
        app.kubernetes.io/component: alerting
        app.kubernetes.io/part-of: hire-adda
    type: Opaque
