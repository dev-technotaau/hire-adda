# ============================================================
# SealedSecret Template — OTel Collector Secrets
# ============================================================
# Source of truth: infra/docker/.env (HONEYCOMB_API_KEY)
# Regenerate: infra/scripts/sealed-secret-create.sh
# ============================================================
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: otel-secrets
  namespace: monitoring
  labels:
    app: otel-collector
    app.kubernetes.io/name: otel-collector
    app.kubernetes.io/component: telemetry
    app.kubernetes.io/part-of: hire-adda
spec:
  encryptedData:
    HONEYCOMB_API_KEY: 
  template:
    metadata:
      name: otel-secrets
      namespace: monitoring
      labels:
        app: otel-collector
        app.kubernetes.io/name: otel-collector
        app.kubernetes.io/component: telemetry
        app.kubernetes.io/part-of: hire-adda
    type: Opaque
