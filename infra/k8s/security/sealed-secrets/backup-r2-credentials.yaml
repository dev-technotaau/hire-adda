# ============================================================
# SealedSecret — Backup R2 Credentials
# ============================================================
# Cloudflare R2 credentials for backup CronJobs (db, redis, opensearch).
# Regenerate: kubeseal on VPS with --controller-name sealed-secrets-controller
# ============================================================
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: backup-r2-credentials
  namespace: hire-adda
  labels:
    app: backups
    app.kubernetes.io/name: backups
    app.kubernetes.io/component: backup
    app.kubernetes.io/part-of: hire-adda
spec:
  encryptedData:
    AWS_ACCESS_KEY_ID: 
    AWS_SECRET_ACCESS_KEY: 
  template:
    metadata:
      name: backup-r2-credentials
      namespace: hire-adda
      labels:
        app: backups
        app.kubernetes.io/name: backups
        app.kubernetes.io/component: backup
        app.kubernetes.io/part-of: hire-adda
    type: Opaque
