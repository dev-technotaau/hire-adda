# ============================================================
# SealedSecret Template — Backend Secrets
# ============================================================
# This is a TEMPLATE showing the structure. Actual encrypted
# values are generated by running:
#   infra/scripts/sealed-secret-create.sh
#
# The script reads backend/.env, creates a K8s Secret, then
# seals it using kubeseal. The output replaces this file.
#
# Prerequisites:
#   1. kubeseal CLI installed locally
#   2. SealedSecrets controller running in cluster:
#      helm install sealed-secrets bitnami/sealed-secrets \
#        --namespace kube-system --set resources.limits.memory=64Mi
#   3. backend/.env file with all 170+ env vars
#
# Regenerate after any env var change:
#   cd infra && ./scripts/sealed-secret-create.sh
# ============================================================
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: backend-secrets
  namespace: talent-bridge
  labels:
    app: backend
    app.kubernetes.io/name: backend
    app.kubernetes.io/component: api
    app.kubernetes.io/part-of: talent-bridge
spec:
  encryptedData:
    # ── Database ──
    DATABASE_URL: '<SEALED_VALUE>'
    POSTGRES_PASSWORD: '<SEALED_VALUE>'

    # ── Redis ──
    # No password (internal network, NetworkPolicy protected)

    # ── JWT ──
    JWT_SECRET: '<SEALED_VALUE>'
    JWT_REFRESH_SECRET: '<SEALED_VALUE>'

    # ── Session / CSRF ──
    SESSION_SECRET: '<SEALED_VALUE>'
    CSRF_SECRET: '<SEALED_VALUE>'
    BFF_SECRET: '<SEALED_VALUE>'

    # ── OAuth ──
    GOOGLE_CLIENT_ID: '<SEALED_VALUE>'
    GOOGLE_CLIENT_SECRET: '<SEALED_VALUE>'
    LINKEDIN_CLIENT_ID: '<SEALED_VALUE>'
    LINKEDIN_CLIENT_SECRET: '<SEALED_VALUE>'

    # ── Cloudinary ──
    CLOUDINARY_CLOUD_NAME: '<SEALED_VALUE>'
    CLOUDINARY_API_KEY: '<SEALED_VALUE>'
    CLOUDINARY_API_SECRET: '<SEALED_VALUE>'

    # ── Cloudflare R2 ──
    R2_ACCOUNT_ID: '<SEALED_VALUE>'
    R2_ACCESS_KEY_ID: '<SEALED_VALUE>'
    R2_SECRET_ACCESS_KEY: '<SEALED_VALUE>'
    R2_BUCKET_NAME: '<SEALED_VALUE>'

    # ── Firebase ──
    FIREBASE_PROJECT_ID: '<SEALED_VALUE>'
    FIREBASE_PRIVATE_KEY: '<SEALED_VALUE>'
    FIREBASE_CLIENT_EMAIL: '<SEALED_VALUE>'
    FIREBASE_DATABASE_URL: '<SEALED_VALUE>'

    # ── Twilio ──
    TWILIO_ACCOUNT_SID: '<SEALED_VALUE>'
    TWILIO_AUTH_TOKEN: '<SEALED_VALUE>'
    TWILIO_PHONE_NUMBER: '<SEALED_VALUE>'

    # ── WhatsApp (Meta) ──
    WHATSAPP_TOKEN: '<SEALED_VALUE>'
    WHATSAPP_PHONE_NUMBER_ID: '<SEALED_VALUE>'
    WHATSAPP_VERIFY_TOKEN: '<SEALED_VALUE>'

    # ── Kafka (Aiven) ──
    KAFKA_BROKERS: '<SEALED_VALUE>'
    KAFKA_USERNAME: '<SEALED_VALUE>'
    KAFKA_PASSWORD: '<SEALED_VALUE>'
    KAFKA_SSL_CA: '<SEALED_VALUE>'

    # ── Google Cloud ──
    GOOGLE_APPLICATION_CREDENTIALS_JSON: '<SEALED_VALUE>'
    BIGQUERY_DATASET_ID: '<SEALED_VALUE>'
    CLOUD_TALENT_PROJECT_ID: '<SEALED_VALUE>'
    DOCUMENT_AI_PROCESSOR_ID: '<SEALED_VALUE>'

    # ── Sentry ──
    SENTRY_DSN: '<SEALED_VALUE>'

    # ── SMTP ──
    SMTP_HOST: '<SEALED_VALUE>'
    SMTP_PORT: '<SEALED_VALUE>'
    SMTP_USER: '<SEALED_VALUE>'
    SMTP_PASS: '<SEALED_VALUE>'

    # ── WebAuthn ──
    WEBAUTHN_RP_ID: '<SEALED_VALUE>'

    # ── Webhook HMAC ──
    WEBHOOK_SIGNING_SECRET: '<SEALED_VALUE>'

    # ── GA4 ──
    GA4_MEASUREMENT_ID: '<SEALED_VALUE>'
    GA4_API_SECRET: '<SEALED_VALUE>'

  template:
    metadata:
      name: backend-secrets
      namespace: talent-bridge
      labels:
        app: backend
        app.kubernetes.io/name: backend
        app.kubernetes.io/component: api
        app.kubernetes.io/part-of: talent-bridge
    type: Opaque
---
# ============================================================
# PostgreSQL SealedSecret
# ============================================================
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: postgres-secrets
  namespace: talent-bridge
  labels:
    app: postgres
spec:
  encryptedData:
    POSTGRES_PASSWORD: '<SEALED_VALUE>'
  template:
    metadata:
      name: postgres-secrets
      namespace: talent-bridge
      labels:
        app: postgres
    type: Opaque
