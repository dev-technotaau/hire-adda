# ============================================================
# Kafka — Network Policy (2-node KRaft cluster)
# Backend → broker, inter-broker replication + controller quorum,
# Prometheus → kafka-exporter metrics
# ============================================================
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: kafka-netpol
  namespace: hire-adda
spec:
  podSelector:
    matchLabels:
      app: kafka
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # Inter-broker communication (replication + KRaft controller quorum)
    - from:
        - podSelector:
            matchLabels:
              app: kafka
      ports:
        - port: 9092
          protocol: TCP
        - port: 9093
          protocol: TCP
    # From backend (producer/consumer connections)
    - from:
        - podSelector:
            matchLabels:
              app: backend
      ports:
        - port: 9092
          protocol: TCP
    # Allow Prometheus to scrape kafka-exporter
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: monitoring
      ports:
        - port: 9308
          protocol: TCP
  egress:
    # DNS
    - to: []
      ports:
        - port: 53
          protocol: UDP
    # Inter-broker communication (replication + KRaft controller quorum)
    - to:
        - podSelector:
            matchLabels:
              app: kafka
      ports:
        - port: 9092
          protocol: TCP
        - port: 9093
          protocol: TCP
