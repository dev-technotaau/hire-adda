# ============================================================
# Redis — Network Policy
# Only backend can connect.
# ============================================================
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: redis-netpol
  namespace: talent-bridge
spec:
  podSelector:
    matchLabels:
      app: redis
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: backend
      ports:
        - port: 6379
          protocol: TCP
    # Allow Prometheus to scrape redis-exporter
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: monitoring
      ports:
        - port: 9121
          protocol: TCP
  egress:
    # DNS only
    - to: []
      ports:
        - port: 53
          protocol: UDP
