# ============================================================
# DB Backup CronJob — Network Policy
# Init container: egress to PostgreSQL (5432)
# Main container: egress to R2 (443) for S3 upload
# ============================================================
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: db-backup-netpol
  namespace: hire-adda
spec:
  podSelector:
    matchLabels:
      app: db-backup
  policyTypes:
    - Egress
  egress:
    # DNS
    - to: []
      ports:
        - port: 53
          protocol: UDP
    # PostgreSQL (init container pg_dump)
    - to:
        - podSelector:
            matchLabels:
              app: postgres
      ports:
        - port: 5432
          protocol: TCP
    # HTTPS egress for R2 upload
    - to: []
      ports:
        - port: 443
          protocol: TCP
