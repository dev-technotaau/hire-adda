# ============================================================
# Frontend — Service
# ============================================================
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: hire-adda
  labels:
    app: frontend
    app.kubernetes.io/name: frontend
spec:
  type: ClusterIP
  ports:
    - name: http
      port: 3000
      targetPort: 3000
      protocol: TCP
  selector:
    app: frontend
