# ============================================================
# Frontend — Deployment
# Next.js 16 standalone output
# ============================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: hire-adda
  labels:
    app: frontend
    tier: app
    app.kubernetes.io/name: frontend
    app.kubernetes.io/component: web
    app.kubernetes.io/part-of: hire-adda
spec:
  replicas: 1
  revisionHistoryLimit: 5
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
        tier: app
    spec:
      securityContext:
        runAsUser: 1001
        runAsGroup: 1001
        fsGroup: 1001
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: frontend
          image: ghcr.io/dev-technotaau/hire-adda-frontend:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 3000
              protocol: TCP
          env:
            - name: NODE_ENV
              value: 'production'
            # NEXT_PUBLIC_* vars are baked at build time in the CD pipeline
            # Only server-side runtime vars needed here:
            - name: BACKEND_INTERNAL_URL
              value: 'http://nginx:80/api/v1'
            - name: BFF_SECRET
              valueFrom:
                secretKeyRef:
                  name: backend-secrets
                  key: BFF_SECRET
            # BFF auth cookie settings (matches Docker Compose)
            - name: COOKIE_ACCESS_MAX_AGE_DAYS
              value: '7'
            - name: COOKIE_REFRESH_MAX_AGE_DAYS
              value: '30'
            # OpenTelemetry
            - name: OTEL_ENABLED
              value: 'true'
            - name: OTEL_SERVICE_NAME
              value: 'hire-adda-frontend'
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: 'http://otel-collector.monitoring.svc.cluster.local:4318/v1/traces'
          resources:
            requests:
              memory: '256Mi'
              cpu: '100m'
            limits:
              memory: '512Mi'
              cpu: '500m'
          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir:
            sizeLimit: 128Mi
      imagePullSecrets:
        - name: ghcr-credentials
      terminationGracePeriodSeconds: 15
