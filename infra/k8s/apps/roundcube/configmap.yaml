# ============================================================
# Roundcube ConfigMap — Custom configuration
# Migrated from infra/mail/roundcube-custom.php
# ============================================================
apiVersion: v1
kind: ConfigMap
metadata:
  name: roundcube-config
  namespace: hire-adda
  labels:
    app: roundcube
    app.kubernetes.io/name: roundcube
    app.kubernetes.io/component: webmail
    app.kubernetes.io/part-of: hire-adda
data:
  custom.config.php: |
    <?php
    // Skip SSL cert verification for connections to Docker mailserver
    // (cert is for mail.hireadda.in but K8s resolves via mailserver-external)
    $config['imap_conn_options'] = [
        'ssl' => [
            'verify_peer' => false,
            'verify_peer_name' => false,
            'allow_self_signed' => true,
        ],
    ];
    $config['smtp_conn_options'] = [
        'ssl' => [
            'verify_peer' => false,
            'verify_peer_name' => false,
            'allow_self_signed' => true,
        ],
    ];
