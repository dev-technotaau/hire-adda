# ============================================================
# Roundcube Webmail — Service
# ============================================================
apiVersion: v1
kind: Service
metadata:
  name: roundcube
  namespace: talent-bridge
  labels:
    app: roundcube
    app.kubernetes.io/name: roundcube
    app.kubernetes.io/component: webmail
    app.kubernetes.io/part-of: talent-bridge
spec:
  type: ClusterIP
  ports:
    - port: 80
      targetPort: 80
      protocol: TCP
      name: http
  selector:
    app: roundcube
