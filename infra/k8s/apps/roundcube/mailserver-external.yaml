# ============================================================
# External Mailserver Service
# Routes K8s traffic to the Docker mailserver on the host
# ============================================================
# The SMTP/IMAP mailserver runs in Docker (outside K3s) and
# binds ports directly to the host. This headless Service +
# Endpoints pair lets K8s pods reach it via DNS:
#   mailserver-external.hire-adda.svc.cluster.local
#
# Update the IP in Endpoints if the host IP changes.
# ============================================================
apiVersion: v1
kind: Service
metadata:
  name: mailserver-external
  namespace: hire-adda
  labels:
    app: mailserver-external
    app.kubernetes.io/name: mailserver
    app.kubernetes.io/component: mail
    app.kubernetes.io/part-of: hire-adda
spec:
  # No selector — manually managed Endpoints
  type: ClusterIP
  ports:
    - name: imap
      port: 143
      targetPort: 143
      protocol: TCP
    - name: smtp-submission
      port: 587
      targetPort: 587
      protocol: TCP
    - name: imaps
      port: 993
      targetPort: 993
      protocol: TCP
---
apiVersion: v1
kind: Endpoints
metadata:
  name: mailserver-external
  namespace: hire-adda
  labels:
    app: mailserver-external
subsets:
  - addresses:
      # Host IP where Docker mailserver runs
      # Update this if the VPS IP changes
      - ip: '148.230.67.210'
    ports:
      - name: imap
        port: 143
        protocol: TCP
      - name: smtp-submission
        port: 587
        protocol: TCP
      - name: imaps
        port: 993
        protocol: TCP
