# ============================================================
# Roundcube Webmail — Deployment
# Web UI for the Docker mailserver (SMTP/IMAP stays in Docker)
# Accessed via K8s ingress at mail.hireadda.in
# ============================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: roundcube
  namespace: talent-bridge
  labels:
    app: roundcube
    tier: app
    app.kubernetes.io/name: roundcube
    app.kubernetes.io/component: webmail
    app.kubernetes.io/part-of: talent-bridge
spec:
  replicas: 1
  selector:
    matchLabels:
      app: roundcube
  template:
    metadata:
      labels:
        app: roundcube
        tier: app
    spec:
      securityContext:
        runAsUser: 33 # www-data
        runAsGroup: 33
        fsGroup: 33
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: roundcube
          image: roundcube/roundcubemail:latest
          ports:
            - name: http
              containerPort: 80
              protocol: TCP
          env:
            # Connect to Docker mailserver via K8s ExternalName service
            - name: ROUNDCUBEMAIL_DEFAULT_HOST
              value: 'tls://mailserver-external'
            - name: ROUNDCUBEMAIL_DEFAULT_PORT
              value: '143'
            - name: ROUNDCUBEMAIL_SMTP_SERVER
              value: 'tls://mailserver-external'
            - name: ROUNDCUBEMAIL_SMTP_PORT
              value: '587'
            - name: ROUNDCUBEMAIL_UPLOAD_MAX_FILESIZE
              value: '25M'
            - name: ROUNDCUBEMAIL_SKIN
              value: 'elastic'
            - name: ROUNDCUBEMAIL_PLUGINS
              value: 'archive,managesieve,zipdownload,markasjunk'
            - name: ROUNDCUBEMAIL_DB_TYPE
              value: 'sqlite'
          resources:
            requests:
              memory: '128Mi'
              cpu: '50m'
            limits:
              memory: '256Mi'
              cpu: '250m'
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 15
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
              add:
                - NET_BIND_SERVICE # Required to bind port 80
          volumeMounts:
            - name: roundcube-data
              mountPath: /var/roundcube/db
            - name: roundcube-temp
              mountPath: /tmp/roundcube-temp
            - name: roundcube-config
              mountPath: /var/roundcube/config/custom.config.php
              subPath: custom.config.php
              readOnly: true
      volumes:
        - name: roundcube-data
          persistentVolumeClaim:
            claimName: roundcube-data
        - name: roundcube-temp
          emptyDir: {}
        - name: roundcube-config
          configMap:
            name: roundcube-config
---
# PVC for Roundcube SQLite database
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: roundcube-data
  namespace: talent-bridge
  labels:
    app: roundcube
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: local-path
  resources:
    requests:
      storage: 1Gi
