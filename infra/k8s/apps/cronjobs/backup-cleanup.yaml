# ============================================================
# Backup Cleanup — CronJob (Weekly, Sunday 4AM UTC)
# Removes database backups older than 30 days
# ============================================================
apiVersion: batch/v1
kind: CronJob
metadata:
  name: backup-cleanup
  namespace: hire-adda
  labels:
    app: backup-cleanup
    tier: maintenance
spec:
  schedule: '0 4 * * 0'
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 2
  failedJobsHistoryLimit: 2
  jobTemplate:
    spec:
      backoffLimit: 1
      activeDeadlineSeconds: 300
      template:
        metadata:
          labels:
            app: backup-cleanup
          annotations:
            # Skip the backups-pvc volume from Velero file-system
            # backup — it's where the OTHER backup cron jobs
            # (db-backup, redis-backup) drop their dump files, so
            # backing it up via Velero would mean backups-of-backups
            # (every Postgres dump stored twice: once as a SQL.gz
            # in `backups/db/` and again inside Kopia's chunk store).
            backup.velero.io/backup-volumes-excludes: backups
        spec:
          securityContext:
            runAsUser: 1001
            runAsGroup: 1001
            runAsNonRoot: true
            seccompProfile:
              type: RuntimeDefault
          containers:
            - name: cleanup
              image: busybox:1.36
              command: ['/bin/sh', '-c']
              args:
                - |
                  set -e
                  BACKUP_DIR="/backups/db"
                  RETENTION_DAYS=30

                  if [ ! -d "$BACKUP_DIR" ]; then
                    echo "Backup directory does not exist. Nothing to clean."
                    exit 0
                  fi

                  echo "Cleaning backups older than $RETENTION_DAYS days..."

                  DELETED=$(find "$BACKUP_DIR" -name "*.sql.gz" -mtime +$RETENTION_DAYS -type f -print -delete | wc -l)

                  REMAINING=$(find "$BACKUP_DIR" -name "*.sql.gz" -type f | wc -l)
                  echo "Cleanup complete. Deleted: $DELETED, Remaining: $REMAINING"
              resources:
                requests:
                  memory: '16Mi'
                  cpu: '10m'
                limits:
                  memory: '32Mi'
                  cpu: '50m'
              securityContext:
                allowPrivilegeEscalation: false
                capabilities:
                  drop:
                    - ALL
              volumeMounts:
                - name: backups
                  mountPath: /backups
          restartPolicy: OnFailure
          volumes:
            - name: backups
              persistentVolumeClaim:
                claimName: backups-pvc
