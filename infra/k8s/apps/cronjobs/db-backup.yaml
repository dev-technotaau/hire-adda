# ============================================================
# Database Backup — CronJob (Daily 2AM UTC)
# pg_dump → gzip → PVC storage + upload to Cloudflare R2
# ============================================================
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: backups-pvc
  namespace: hire-adda
  labels:
    app: backups
spec:
  accessModes: ['ReadWriteOnce']
  storageClassName: local-path
  resources:
    requests:
      storage: 20Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: uploads-pvc
  namespace: hire-adda
  labels:
    app: uploads
spec:
  accessModes: ['ReadWriteOnce']
  storageClassName: local-path
  resources:
    requests:
      storage: 10Gi
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: db-backup
  namespace: hire-adda
  labels:
    app: db-backup
    tier: maintenance
spec:
  schedule: '0 2 * * *'
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 2
      activeDeadlineSeconds: 600
      template:
        metadata:
          labels:
            app: db-backup
        spec:
          securityContext:
            runAsUser: 1001
            runAsGroup: 1001
            runAsNonRoot: true
            seccompProfile:
              type: RuntimeDefault
          initContainers:
            - name: pg-dump
              image: postgres:16-alpine
              command: ['/bin/sh', '-c']
              args:
                - |
                  set -eo pipefail
                  mkdir -p /backups/db

                  # Wait for network policy propagation
                  echo "Waiting for PostgreSQL connectivity..."
                  for i in 1 2 3 4 5 6; do
                    if pg_isready -h "$PGHOST" -p "$PGPORT" >/dev/null 2>&1; then
                      echo "PostgreSQL reachable"
                      break
                    fi
                    [ "$i" -eq 6 ] && { echo "ERROR: Cannot reach PostgreSQL"; exit 1; }
                    sleep 5
                  done

                  TIMESTAMP=$(date +%Y%m%d_%H%M%S)
                  BACKUP_FILE="/backups/db/hire_adda_${TIMESTAMP}.sql.gz"
                  # Write timestamp to shared file for R2 upload step
                  echo "$TIMESTAMP" > /backups/db/.latest_timestamp
                  echo "Starting database backup..."
                  pg_dump \
                    -h "$PGHOST" \
                    -p "$PGPORT" \
                    -U "$PGUSER" \
                    -d "$PGDATABASE" \
                    --no-owner \
                    --no-privileges \
                    --clean \
                    --if-exists \
                    --format=plain | gzip > "$BACKUP_FILE"
                  SIZE=$(du -h "$BACKUP_FILE" | cut -f1)
                  echo "Backup complete: $BACKUP_FILE ($SIZE)"
              env:
                - name: PGPASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: postgres-secrets
                      key: POSTGRES_PASSWORD
                - name: PGHOST
                  value: 'postgres'
                - name: PGPORT
                  value: '5432'
                - name: PGUSER
                  value: 'postgres'
                - name: PGDATABASE
                  value: 'hireadda'
              resources:
                requests:
                  memory: '64Mi'
                  cpu: '50m'
                limits:
                  memory: '256Mi'
                  cpu: '250m'
              securityContext:
                allowPrivilegeEscalation: false
                capabilities:
                  drop:
                    - ALL
              volumeMounts:
                - name: backups
                  mountPath: /backups
          containers:
            - name: r2-upload
              image: amazon/aws-cli:2.22.35
              command: ['/bin/sh', '-c']
              args:
                - |
                  set -e
                  TIMESTAMP=$(cat /backups/db/.latest_timestamp)
                  BACKUP_FILE="/backups/db/hire_adda_${TIMESTAMP}.sql.gz"
                  R2_KEY="backups/db/hire_adda_${TIMESTAMP}.sql.gz"
                  BUCKET="hire-adda-velero-backups"
                  ENDPOINT="https://a8b640d2139e475f3b205abffe656faf.r2.cloudflarestorage.com"

                  echo "Uploading to R2: ${R2_KEY}"
                  aws s3 cp "$BACKUP_FILE" "s3://${BUCKET}/${R2_KEY}" \
                    --endpoint-url "$ENDPOINT"
                  echo "Upload complete: s3://${BUCKET}/${R2_KEY}"

                  # Cleanup R2 backups older than 30 days
                  echo "Cleaning up old DB backups from R2..."
                  CUTOFF=$(date -d '30 days ago' +%Y%m%d 2>/dev/null || date -v-30d +%Y%m%d)
                  aws s3 ls "s3://${BUCKET}/backups/db/" --endpoint-url "$ENDPOINT" | \
                    awk '{print $4}' | grep -E '^hire_adda_[0-9]{8}_' | while read -r file; do
                      FILE_DATE=$(echo "$file" | grep -oE '[0-9]{8}')
                      if [ "$FILE_DATE" -lt "$CUTOFF" ] 2>/dev/null; then
                        echo "Deleting old backup: $file"
                        aws s3 rm "s3://${BUCKET}/backups/db/${file}" --endpoint-url "$ENDPOINT"
                      fi
                    done
                  echo "Cleanup complete"
              env:
                - name: AWS_ACCESS_KEY_ID
                  valueFrom:
                    secretKeyRef:
                      name: backup-r2-credentials
                      key: AWS_ACCESS_KEY_ID
                - name: AWS_SECRET_ACCESS_KEY
                  valueFrom:
                    secretKeyRef:
                      name: backup-r2-credentials
                      key: AWS_SECRET_ACCESS_KEY
                - name: AWS_DEFAULT_REGION
                  value: 'auto'
              resources:
                requests:
                  memory: '64Mi'
                  cpu: '50m'
                limits:
                  memory: '128Mi'
                  cpu: '200m'
              securityContext:
                allowPrivilegeEscalation: false
                capabilities:
                  drop:
                    - ALL
              volumeMounts:
                - name: backups
                  mountPath: /backups
          restartPolicy: OnFailure
          volumes:
            - name: backups
              persistentVolumeClaim:
                claimName: backups-pvc
