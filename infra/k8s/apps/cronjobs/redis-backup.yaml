# ============================================================
# Redis Backup — CronJob (Daily 2:30AM UTC)
# BGSAVE → export RDB → upload to Cloudflare R2
# ============================================================
apiVersion: batch/v1
kind: CronJob
metadata:
  name: redis-backup
  namespace: hire-adda
  labels:
    app: redis-backup
    tier: maintenance
spec:
  schedule: '30 2 * * *'
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 2
      activeDeadlineSeconds: 600
      template:
        metadata:
          labels:
            app: redis-backup
        spec:
          securityContext:
            runAsUser: 1001
            runAsGroup: 1001
            runAsNonRoot: true
            seccompProfile:
              type: RuntimeDefault
          initContainers:
            - name: redis-dump
              image: redis:7-alpine
              command: ['/bin/sh', '-c']
              args:
                - |
                  set -e
                  mkdir -p /backups/redis

                  echo "Triggering BGSAVE..."
                  BEFORE=$(redis-cli -h redis -a "$REDIS_PASSWORD" --no-auth-warning LASTSAVE)
                  redis-cli -h redis -a "$REDIS_PASSWORD" --no-auth-warning BGSAVE

                  # Wait for BGSAVE to complete (up to 2 minutes)
                  for i in $(seq 1 120); do
                    AFTER=$(redis-cli -h redis -a "$REDIS_PASSWORD" --no-auth-warning LASTSAVE)
                    if [ "$AFTER" != "$BEFORE" ]; then
                      echo "BGSAVE complete (LASTSAVE changed: $BEFORE → $AFTER)"
                      break
                    fi
                    sleep 1
                  done

                  echo "Exporting RDB dump..."
                  redis-cli -h redis -a "$REDIS_PASSWORD" --no-auth-warning --rdb /backups/redis/dump.rdb
                  SIZE=$(du -h /backups/redis/dump.rdb | cut -f1)
                  echo "RDB export complete: /backups/redis/dump.rdb ($SIZE)"
              env:
                - name: REDIS_PASSWORD
                  valueFrom:
                    configMapKeyRef:
                      name: backend-config
                      key: REDIS_PASSWORD
              resources:
                requests:
                  memory: '32Mi'
                  cpu: '25m'
                limits:
                  memory: '64Mi'
                  cpu: '100m'
              securityContext:
                allowPrivilegeEscalation: false
                capabilities:
                  drop:
                    - ALL
              volumeMounts:
                - name: backups
                  mountPath: /backups
          containers:
            - name: r2-upload
              image: amazon/aws-cli:2.22.35
              command: ['/bin/sh', '-c']
              args:
                - |
                  set -e
                  TIMESTAMP=$(date +%Y%m%d_%H%M%S)
                  R2_KEY="backups/redis/redis_${TIMESTAMP}.rdb"
                  BUCKET="hire-adda-velero-backups"
                  ENDPOINT="https://c6027029a4faaf83fb46084c06d9762b.r2.cloudflarestorage.com"

                  echo "Uploading RDB to R2: ${R2_KEY}"
                  aws s3 cp /backups/redis/dump.rdb "s3://${BUCKET}/${R2_KEY}" \
                    --endpoint-url "$ENDPOINT"
                  echo "Upload complete: s3://${BUCKET}/${R2_KEY}"

                  # Cleanup R2 backups older than 30 days
                  echo "Cleaning up old Redis backups..."
                  CUTOFF=$(date -d '30 days ago' +%Y%m%d 2>/dev/null || date -v-30d +%Y%m%d)
                  aws s3 ls "s3://${BUCKET}/backups/redis/" --endpoint-url "$ENDPOINT" | \
                    awk '{print $4}' | grep -E '^redis_[0-9]{8}_' | while read -r file; do
                      FILE_DATE=$(echo "$file" | grep -oE '[0-9]{8}')
                      if [ "$FILE_DATE" -lt "$CUTOFF" ] 2>/dev/null; then
                        echo "Deleting old backup: $file"
                        aws s3 rm "s3://${BUCKET}/backups/redis/${file}" --endpoint-url "$ENDPOINT"
                      fi
                    done
                  echo "Cleanup complete"
              env:
                - name: AWS_ACCESS_KEY_ID
                  valueFrom:
                    secretKeyRef:
                      name: backup-r2-credentials
                      key: AWS_ACCESS_KEY_ID
                - name: AWS_SECRET_ACCESS_KEY
                  valueFrom:
                    secretKeyRef:
                      name: backup-r2-credentials
                      key: AWS_SECRET_ACCESS_KEY
                - name: AWS_DEFAULT_REGION
                  value: 'auto'
              resources:
                requests:
                  memory: '64Mi'
                  cpu: '50m'
                limits:
                  memory: '128Mi'
                  cpu: '200m'
              securityContext:
                allowPrivilegeEscalation: false
                capabilities:
                  drop:
                    - ALL
              volumeMounts:
                - name: backups
                  mountPath: /backups
          restartPolicy: OnFailure
          volumes:
            - name: backups
              persistentVolumeClaim:
                claimName: backups-pvc
