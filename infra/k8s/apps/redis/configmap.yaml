# ============================================================
# Redis ConfigMap — Configuration for cache + BullMQ
# Can be mounted as redis.conf or used as env reference
# ============================================================
apiVersion: v1
kind: ConfigMap
metadata:
  name: redis-config
  namespace: talent-bridge
  labels:
    app: redis
    tier: cache
    app.kubernetes.io/name: redis
    app.kubernetes.io/component: cache
    app.kubernetes.io/part-of: talent-bridge
data:
  redis.conf: |
    # ── Memory ──
    maxmemory 256mb
    maxmemory-policy allkeys-lru

    # ── Persistence ──
    appendonly yes
    appendfsync everysec
    save 900 1
    save 300 10

    # ── Performance ──
    tcp-backlog 511
    timeout 0
    tcp-keepalive 300

    # ── Limits ──
    maxclients 10000

    # ── Logging ──
    loglevel notice

    # ── Security ──
    # No password (internal network only, protected by NetworkPolicy)
    protected-mode no
    bind 0.0.0.0

    # ── Latency monitoring ──
    latency-monitor-threshold 100

    # ── Slow log ──
    slowlog-log-slower-than 10000
    slowlog-max-len 128
