# ============================================================
# Redis — Service
# ============================================================
apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: hire-adda
  labels:
    app: redis
    app.kubernetes.io/name: redis
spec:
  type: ClusterIP
  clusterIP: None
  ports:
    - name: tcp-redis
      port: 6379
      targetPort: 6379
      protocol: TCP
    - name: metrics
      port: 9121
      targetPort: 9121
      protocol: TCP
  selector:
    app: redis
