# ============================================================
# Backend API — ConfigMap (non-secret environment variables)
# Secrets are in SealedSecrets (security/sealed-secrets/)
# ============================================================
# Source of truth: infra/docker/.env (production)
# Keep in sync — run `sealed-secret-create.sh` for secrets.
# ============================================================
apiVersion: v1
kind: ConfigMap
metadata:
  name: backend-config
  namespace: hire-adda
  labels:
    app: backend
    app.kubernetes.io/name: backend
    app.kubernetes.io/component: api
    app.kubernetes.io/part-of: hire-adda
data:
  # ══════════════════════════════════════════════════════════════
  # Infrastructure Profile: All Local K8s
  # ══════════════════════════════════════════════════════════════
  # PostgreSQL, Redis, Kafka, OpenSearch: all local K8s
  # ══════════════════════════════════════════════════════════════

  # ── Server ──
  NODE_ENV: 'production'
  PORT: '5000'

  # ── Database (Local K8s PostgreSQL) ──
  # DATABASE_URL and DIRECT_URL are in backend-secrets (contain password)
  DATABASE_POOL_SIZE: '10'
  DATABASE_POOL_TIMEOUT: '10'
  DATABASE_SSL_MODE: 'disable'

  # ── Redis (LOCAL — Phase 2 override, shadows SealedSecret cloud values) ──
  REDIS_HOST: 'redis'
  REDIS_PORT: '6379'
  REDIS_ENABLED: 'true'
  REDIS_TLS: 'false'
  REDIS_PASSWORD: '10e4c845b45ebeb6f2a4b31a12f82d431735eeb970b63f45d726b4f7aa6e12c6'
  REDIS_URL: 'redis://default:10e4c845b45ebeb6f2a4b31a12f82d431735eeb970b63f45d726b4f7aa6e12c6@redis:6379'

  # ── Elasticsearch/OpenSearch (K8s service DNS) ──
  ELASTICSEARCH_URL: 'http://opensearch:9200'

  # ── Kafka (Local K8s — 3-node KRaft cluster, no SASL) ──
  KAFKA_BROKERS: 'kafka-0.kafka.hire-adda.svc.cluster.local:9092,kafka-1.kafka.hire-adda.svc.cluster.local:9092'
  KAFKA_CLIENT_ID: 'hire-adda-api'

  # ── JWT Authentication ──
  # JWT_SECRET, JWT_REFRESH_SECRET, JWT_PRIVATE_KEY, JWT_PUBLIC_KEY are in SealedSecret
  JWT_EXPIRES_IN: '15m'
  JWT_REFRESH_EXPIRES_IN: '30d'
  JWT_ALGORITHM: 'HS256'
  COOKIE_ACCESS_MAX_AGE_DAYS: '7'
  COOKIE_REFRESH_MAX_AGE_DAYS: '30'

  # ── MFA & Security ──
  # COOKIE_SECRET, CSRF_SECRET, BFF_SECRET are in SealedSecret
  MFA_ISSUER: 'HireAdda'
  MFA_ENABLED: 'true'
  HIBP_ENABLED: 'true'

  # ── Frontend URLs ──
  FRONTEND_URL: 'https://hireadda.in'
  CORS_ORIGIN: 'https://hireadda.in,https://www.hireadda.in'

  # ── WebAuthn ──
  WEBAUTHN_RP_ID: 'hireadda.in'
  WEBAUTHN_RP_NAME: 'HireAdda'
  WEBAUTHN_ORIGIN: 'https://hireadda.in'

  # ── OAuth Callbacks ──
  # GOOGLE_CLIENT_ID/SECRET, LINKEDIN_CLIENT_ID/SECRET are in SealedSecret
  GOOGLE_CALLBACK_URL: 'https://api.hireadda.in/api/v1/auth/google/callback'
  LINKEDIN_CALLBACK_URL: 'https://api.hireadda.in/api/v1/auth/linkedin/callback'

  # ── Email (SMTP via Docker Mailserver on host) ──
  # SMTP_USER, SMTP_PASS are in SealedSecret
  SMTP_HOST: 'mailserver-external'
  SMTP_PORT: '465'
  SMTP_SECURE: 'true'
  SMTP_FROM_NAME: 'Hire Adda'
  EMAIL_FROM: 'noreply@hireadda.in'
  EMAIL_REPLY_TO: 'support@hireadda.in'
  EMAIL_MAX_SEND_PER_HOUR: '25000'
  EMAIL_MAX_SEND_PER_DAY: '1000000'

  # ── SMS & WhatsApp ──
  # TWILIO_*, META_WHATSAPP_* credentials are in SealedSecret
  ENABLE_TRANSACTIONAL_SMS: 'true'

  # ── Web Push (VAPID) ──
  # VAPID_PUBLIC_KEY, VAPID_PRIVATE_KEY are in SealedSecret
  VAPID_SUBJECT: 'mailto:admin@hireadda.in'

  # ── Google Cloud Platform ──
  # GOOGLE_APPLICATION_CREDENTIALS_JSON is in SealedSecret
  GOOGLE_CLOUD_PROJECT_ID: 'job-portal-ca578'
  GOOGLE_CLOUD_LOCATION_ID: 'asia-south1'
  CLOUD_TALENT_TENANT_ID: 'e54dbdcb-3ac1-4f67-a57b-d73d15c231cb'

  # ── Geocoding ──
  GEOCODING_PROVIDER: 'nominatim'
  NOMINATIM_BASE_URL: 'https://nominatim.openstreetmap.org'
  NOMINATIM_USER_AGENT: 'HireAdda/1.0'

  # ── Cloudflare R2 (public URL) ──
  # R2 credentials are in SealedSecret
  R2_PUBLIC_URL: 'https://pub-5ee3080a1ae54cd89b234cf0c329af4e.r2.dev'

  # ── Webhooks ──
  # WEBHOOK_SECRET is in SealedSecret
  WEBHOOK_CALLBACK_URL: 'https://api.hireadda.in/api/v1/webhooks'

  # ── Rate Limiting ──
  RATE_LIMIT_WINDOW_MS: '900000'
  RATE_LIMIT_MAX_REQUESTS: '1000'
  AUTH_RATE_LIMIT_WINDOW_MS: '300000'
  AUTH_RATE_LIMIT_MAX_ATTEMPTS: '10'

  # ── File Uploads ──
  UPLOAD_MAX_SIZE: '5242880'
  UPLOAD_DIR: 'uploads'

  # ── BullMQ Settings ──
  BULLMQ_DEFAULT_JOB_OPTIONS_ATTEMPTS: '3'
  BULLMQ_DEFAULT_JOB_OPTIONS_BACKOFF: '1000'
  BULLMQ_REMOVE_ON_COMPLETE: '100'
  BULLMQ_REMOVE_ON_FAIL: '500'

  # ── BullMQ Worker Concurrency ──
  BULLMQ_EMAIL_CONCURRENCY: '5'
  BULLMQ_SMS_CONCURRENCY: '5'
  BULLMQ_FCM_CONCURRENCY: '5'
  BULLMQ_WHATSAPP_CONCURRENCY: '10'
  BULLMQ_WEBPUSH_CONCURRENCY: '5'
  BULLMQ_INAPP_CONCURRENCY: '10'
  BULLMQ_WEBHOOK_CONCURRENCY: '5'
  BULLMQ_MATCHING_CONCURRENCY: '3'
  BULLMQ_GEOCODING_CONCURRENCY: '1'
  BULLMQ_RESUME_PARSE_CONCURRENCY: '2'
  BULLMQ_ES_REINDEX_CONCURRENCY: '3'
  BULLMQ_SCHEDULER_CONCURRENCY: '2'
  BULLMQ_ONBOARDING_DRIP_CONCURRENCY: '3'
  BULLMQ_IMAGE_PROCESSING_CONCURRENCY: '2'

  # ── OTP & Password Reset ──
  OTP_EXPIRY_MINUTES: '10'
  OTP_LENGTH: '6'
  OTP_MAX_RESEND_ATTEMPTS: '5'
  OTP_RESEND_COOLDOWN_SECONDS: '60'
  PASSWORD_RESET_EXPIRY_HOURS: '1'
  PASSWORD_RESET_MAX_ATTEMPTS: '5'
  MAX_LOGIN_ATTEMPTS: '5'
  ACCOUNT_LOCK_DURATION_MINUTES: '15'
  SESSION_TIMEOUT_HOURS: '168'
  MAX_SESSIONS_PER_USER: '5'

  # ── Password Validation ──
  PASSWORD_MIN_LENGTH: '8'
  PASSWORD_MAX_LENGTH: '128'
  PASSWORD_REQUIRE_UPPERCASE: 'true'
  PASSWORD_REQUIRE_LOWERCASE: 'true'
  PASSWORD_REQUIRE_NUMBER: 'true'
  PASSWORD_REQUIRE_SPECIAL: 'true'

  # ── Backup ──
  BACKUP_DIR: './backups'
  BACKUP_RETENTION_DAYS: '30'
  OPENSEARCH_SNAPSHOT_REPO: 'hire_adda_repo'

  # ── Super Admin Seeding ──
  SUPER_ADMIN_EMAIL: 'admin@hireadda.in'

  # ── OpenTelemetry ──
  OTEL_ENABLED: 'true'
  OTEL_SERVICE_NAME: 'hire-adda-api'
  OTEL_EXPORTER_OTLP_ENDPOINT: 'http://otel-collector.monitoring.svc.cluster.local:4318/v1/traces'

  # ── Logging ──
  LOG_LEVEL: 'info'
  LOG_AGGREGATION_URL: 'http://loki.logging.svc.cluster.local:3100/loki/api/v1/push'
