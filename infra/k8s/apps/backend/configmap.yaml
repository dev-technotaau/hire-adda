# ============================================================
# Backend API — ConfigMap (non-secret environment variables)
# Secrets are in SealedSecrets (security/sealed-secrets/)
# ============================================================
apiVersion: v1
kind: ConfigMap
metadata:
  name: backend-config
  namespace: talent-bridge
  labels:
    app: backend
data:
  # ── Server ──
  NODE_ENV: 'production'
  PORT: '5000'

  # ── Database (K8s service DNS) ──
  DATABASE_URL: 'postgresql://postgres:POSTGRES_PASSWORD_PLACEHOLDER@postgres.talent-bridge.svc.cluster.local:5432/talentbridge?schema=public'
  DATABASE_POOL_SIZE: '10'
  DATABASE_SSL_MODE: 'false'

  # ── Redis (K8s service DNS) ──
  REDIS_HOST: 'redis.talent-bridge.svc.cluster.local'
  REDIS_PORT: '6379'
  REDIS_ENABLED: 'true'

  # ── Elasticsearch/OpenSearch (K8s service DNS) ──
  ELASTICSEARCH_URL: 'http://opensearch.talent-bridge.svc.cluster.local:9200'

  # ── Kafka (K8s service DNS — self-hosted KRaft broker) ──
  KAFKA_BROKERS: 'kafka.talent-bridge.svc.cluster.local:9092'
  KAFKA_CLIENT_ID: 'talent-bridge-api'

  # ── Frontend URLs ──
  FRONTEND_URL: 'https://hireadda.in'
  CORS_ORIGIN: 'https://hireadda.in,https://www.hireadda.in'

  # ── WebAuthn ──
  WEBAUTHN_RP_ID: 'hireadda.in'
  WEBAUTHN_RP_NAME: 'HireAdda'
  WEBAUTHN_ORIGIN: 'https://hireadda.in'

  # ── Email ──
  SMTP_FROM_NAME: 'HireAdda'
  EMAIL_FROM: 'noreply@hireadda.in'
  EMAIL_REPLY_TO: 'support@hireadda.in'

  # ── BullMQ Worker Concurrency ──
  BULLMQ_EMAIL_CONCURRENCY: '5'
  BULLMQ_SMS_CONCURRENCY: '5'
  BULLMQ_FCM_CONCURRENCY: '5'
  BULLMQ_WHATSAPP_CONCURRENCY: '10'
  BULLMQ_WEBPUSH_CONCURRENCY: '5'
  BULLMQ_INAPP_CONCURRENCY: '10'
  BULLMQ_WEBHOOK_CONCURRENCY: '5'
  BULLMQ_MATCHING_CONCURRENCY: '3'
  BULLMQ_GEOCODING_CONCURRENCY: '1'
  BULLMQ_RESUME_PARSE_CONCURRENCY: '2'
  BULLMQ_ES_REINDEX_CONCURRENCY: '3'
  BULLMQ_SCHEDULER_CONCURRENCY: '2'
  BULLMQ_ONBOARDING_DRIP_CONCURRENCY: '3'
  BULLMQ_IMAGE_PROCESSING_CONCURRENCY: '2'

  # ── OpenTelemetry ──
  OTEL_ENABLED: 'true'
  OTEL_SERVICE_NAME: 'talent-bridge-api'

  # ── Rate Limiting ──
  RATE_LIMIT_WINDOW_MS: '60000'
  RATE_LIMIT_MAX_REQUESTS: '100'

  # ── Logging ──
  LOG_LEVEL: 'info'
