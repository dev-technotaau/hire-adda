# ============================================================
# Backend API — Service
# ============================================================
apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: hire-adda
  labels:
    app: backend
    app.kubernetes.io/name: backend
spec:
  type: ClusterIP
  ports:
    - name: http
      port: 5000
      targetPort: 5000
      protocol: TCP
  selector:
    app: backend
