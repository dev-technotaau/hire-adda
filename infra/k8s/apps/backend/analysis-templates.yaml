# ============================================================
# Backend — Argo Rollouts AnalysisTemplates
# Prometheus-based blue-green validation (error rate, latency, resources)
# ============================================================
apiVersion: argoproj.io/v1alpha1
kind: AnalysisTemplate
metadata:
  name: backend-success-rate
  namespace: hire-adda
spec:
  metrics:
    - name: error-rate
      count: 3
      failureLimit: 2
      interval: 30s
      provider:
        prometheus:
          address: http://kube-prometheus-stack-prometheus.monitoring:9090
          query: |
            (
              sum(rate(http_requests_total{namespace="hire-adda",app="backend",status=~"5.."}[2m]))
              /
              sum(rate(http_requests_total{namespace="hire-adda",app="backend"}[2m]))
            ) >= 0
            or vector(0)
      successCondition: result[0] < 0.05
    - name: critical-endpoint-error-rate
      count: 3
      failureLimit: 1
      inconclusiveLimit: 3
      interval: 30s
      provider:
        prometheus:
          address: http://kube-prometheus-stack-prometheus.monitoring:9090
          query: |
            max(
              sum by (route) (rate(http_requests_total{namespace="hire-adda",app="backend",route=~"/api/v1/auth/.*|/api/v1/jobs.*|/api/v1/applications.*",status=~"5.."}[2m]))
              /
              sum by (route) (rate(http_requests_total{namespace="hire-adda",app="backend",route=~"/api/v1/auth/.*|/api/v1/jobs.*|/api/v1/applications.*"}[2m]))
            ) >= 0
            or vector(0)
      successCondition: result[0] < 0.10
    - name: latency-p95
      count: 3
      failureLimit: 1
      interval: 30s
      provider:
        prometheus:
          address: http://kube-prometheus-stack-prometheus.monitoring:9090
          query: |
            histogram_quantile(0.95, sum(rate(http_request_duration_seconds_bucket{namespace="hire-adda",app="backend"}[2m])) by (le)) >= 0
            or vector(0)
      successCondition: result[0] < 3
    - name: latency-p99
      count: 3
      failureLimit: 1
      interval: 30s
      provider:
        prometheus:
          address: http://kube-prometheus-stack-prometheus.monitoring:9090
          query: |
            histogram_quantile(0.99, sum(rate(http_request_duration_seconds_bucket{namespace="hire-adda",app="backend"}[2m])) by (le)) >= 0
            or vector(0)
      successCondition: result[0] < 5
    - name: cpu-saturation
      count: 3
      failureLimit: 1
      interval: 30s
      provider:
        prometheus:
          address: http://kube-prometheus-stack-prometheus.monitoring:9090
          query: |
            (
              max(rate(container_cpu_usage_seconds_total{namespace="hire-adda",container="backend"}[2m]))
              /
              max(kube_pod_container_resource_limits{namespace="hire-adda",container="backend",resource="cpu"})
            ) or vector(0)
      successCondition: result[0] < 0.90
    - name: memory-saturation
      count: 3
      failureLimit: 1
      interval: 30s
      provider:
        prometheus:
          address: http://kube-prometheus-stack-prometheus.monitoring:9090
          query: |
            (
              max(container_memory_working_set_bytes{namespace="hire-adda",container="backend"})
              /
              max(kube_pod_container_resource_limits{namespace="hire-adda",container="backend",resource="memory"})
            ) or vector(0)
      successCondition: result[0] < 0.90
---
apiVersion: argoproj.io/v1alpha1
kind: AnalysisTemplate
metadata:
  name: backend-canary-comparison
  namespace: hire-adda
spec:
  args:
    - name: canary-hash
    - name: stable-hash
  metrics:
    - name: canary-vs-stable-error-rate
      count: 3
      failureLimit: 2
      inconclusiveLimit: 3
      interval: 30s
      provider:
        prometheus:
          address: http://kube-prometheus-stack-prometheus.monitoring:9090
          query: |
            (
              (
                sum(rate(http_requests_total{namespace="hire-adda",pod=~"backend-{{args.canary-hash}}.*",status=~"5.."}[2m]))
                / sum(rate(http_requests_total{namespace="hire-adda",pod=~"backend-{{args.canary-hash}}.*"}[2m]))
              ) / (
                sum(rate(http_requests_total{namespace="hire-adda",pod=~"backend-{{args.stable-hash}}.*",status=~"5.."}[2m]))
                / sum(rate(http_requests_total{namespace="hire-adda",pod=~"backend-{{args.stable-hash}}.*"}[2m]))
              )
            ) or vector(1)
      successCondition: result[0] <= 1.5
    - name: canary-vs-stable-latency
      count: 3
      failureLimit: 2
      inconclusiveLimit: 3
      interval: 30s
      provider:
        prometheus:
          address: http://kube-prometheus-stack-prometheus.monitoring:9090
          query: |
            (
              histogram_quantile(0.95,
                sum(rate(http_request_duration_seconds_bucket{namespace="hire-adda",pod=~"backend-{{args.canary-hash}}.*"}[2m])) by (le)
              )
              /
              histogram_quantile(0.95,
                sum(rate(http_request_duration_seconds_bucket{namespace="hire-adda",pod=~"backend-{{args.stable-hash}}.*"}[2m])) by (le)
              )
            ) or vector(1)
      successCondition: result[0] <= 3.0
