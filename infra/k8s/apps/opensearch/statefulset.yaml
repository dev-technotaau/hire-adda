# ============================================================
# OpenSearch 2.18 — StatefulSet (3-node cluster)
# Dual-purpose: application search + log storage
# Quorum-based HA: 3 cluster_manager-eligible data nodes
# ============================================================
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: opensearch
  namespace: hire-adda
  labels:
    app: opensearch
    tier: search
    app.kubernetes.io/name: opensearch
    app.kubernetes.io/component: search
    app.kubernetes.io/part-of: hire-adda
spec:
  serviceName: opensearch
  replicas: 3
  podManagementPolicy: Parallel
  selector:
    matchLabels:
      app: opensearch
  template:
    metadata:
      labels:
        app: opensearch
        tier: search
      annotations:
        # Skip the OpenSearch data PVC from Velero file-system
        # backup. The `opensearch-snapshot` CronJob captures
        # OpenSearch state via its native S3-compatible snapshot
        # API (delta-aware, dedup-friendly) and uploads directly
        # to the same R2 bucket under `backups/opensearch/`.
        # Doubling that with Velero's filesystem-level Kopia
        # backup was the dominant R2 cost — OpenSearch's
        # continual segment-merging defeats Kopia's content-
        # addressed dedup, so every daily snapshot uploaded
        # ~GB of "changed" segment files even when logical data
        # hadn't grown.
        backup.velero.io/backup-volumes-excludes: opensearch-data,keystore-init
    spec:
      securityContext:
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      # Ensure vm.max_map_count >= 262144 (set at host level via Ansible)
      initContainers:
        - name: sysctl-check
          image: busybox:1.36
          command:
            [
              'sh',
              '-c',
              'val=$(cat /proc/sys/vm/max_map_count) && [ "$val" -ge 262144 ] && echo "vm.max_map_count=$val OK" || exit 1',
            ]
          securityContext:
            privileged: false
            allowPrivilegeEscalation: false
            runAsUser: 1000
            runAsNonRoot: true
            capabilities:
              drop:
                - ALL
        # Inject S3/R2 credentials into OpenSearch keystore for snapshot repository
        - name: keystore-init
          image: opensearchproject/opensearch:2.18.0
          command: ['sh', '-c']
          args:
            - |
              bin/opensearch-keystore create
              echo "$AWS_ACCESS_KEY_ID" | bin/opensearch-keystore add --stdin s3.client.default.access_key
              echo "$AWS_SECRET_ACCESS_KEY" | bin/opensearch-keystore add --stdin s3.client.default.secret_key
              cp config/opensearch.keystore /keystore-init/opensearch.keystore
              echo "Keystore created with S3 credentials"
          env:
            - name: AWS_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: backup-r2-credentials
                  key: AWS_ACCESS_KEY_ID
            - name: AWS_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: backup-r2-credentials
                  key: AWS_SECRET_ACCESS_KEY
          volumeMounts:
            - name: keystore-init
              mountPath: /keystore-init
          securityContext:
            allowPrivilegeEscalation: false
            runAsUser: 1000
            runAsNonRoot: true
            capabilities:
              drop:
                - ALL
      containers:
        - name: opensearch
          image: opensearchproject/opensearch:2.18.0
          command:
            - sh
            - -c
            - |
              # Install plugins (idempotent — skips if already installed)
              if ! bin/opensearch-plugin list | grep -q repository-s3; then
                bin/opensearch-plugin install --batch repository-s3
              fi
              if ! bin/opensearch-plugin list | grep -q prometheus-exporter; then
                bin/opensearch-plugin install --batch https://github.com/Aiven-Open/prometheus-exporter-plugin-for-opensearch/releases/download/2.18.0.0/prometheus-exporter-2.18.0.0.zip
              fi
              # Copy S3 keystore from init container (after S3 plugin is installed)
              if [ -f /keystore-init/opensearch.keystore ]; then
                cp /keystore-init/opensearch.keystore config/opensearch.keystore
              fi
              exec ./opensearch-docker-entrypoint.sh opensearch
          ports:
            - name: http
              containerPort: 9200
              protocol: TCP
            - name: transport
              containerPort: 9300
              protocol: TCP
          env:
            - name: cluster.name
              value: 'hireadda'
            - name: node.name
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: discovery.seed_hosts
              value: 'opensearch-0.opensearch,opensearch-1.opensearch,opensearch-2.opensearch'
            - name: cluster.initial_cluster_manager_nodes
              value: 'opensearch-0,opensearch-1,opensearch-2'
            - name: OPENSEARCH_JAVA_OPTS
              value: '-Xms1536m -Xmx1536m'
            - name: DISABLE_SECURITY_PLUGIN
              value: 'true'
            - name: DISABLE_INSTALL_DEMO_CONFIG
              value: 'true'
            - name: s3.client.default.endpoint
              value: 'a8b640d2139e475f3b205abffe656faf.r2.cloudflarestorage.com'
            - name: s3.client.default.region
              value: 'us-east-1'
          resources:
            requests:
              memory: '1536Mi'
              cpu: '150m'
            limits:
              memory: '3Gi'
              cpu: '1500m'
          livenessProbe:
            httpGet:
              path: /_cluster/health
              port: 9200
            initialDelaySeconds: 60
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 5
          readinessProbe:
            httpGet:
              path: /_cluster/health?wait_for_status=yellow&timeout=5s
              port: 9200
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 10
            failureThreshold: 5
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: opensearch-data
              mountPath: /usr/share/opensearch/data
            - name: keystore-init
              mountPath: /keystore-init
              readOnly: true
      volumes:
        - name: keystore-init
          emptyDir:
            sizeLimit: 1Mi
  volumeClaimTemplates:
    - metadata:
        name: opensearch-data
        labels:
          app: opensearch
      spec:
        accessModes: ['ReadWriteOnce']
        storageClassName: local-path
        resources:
          requests:
            storage: 50Gi
