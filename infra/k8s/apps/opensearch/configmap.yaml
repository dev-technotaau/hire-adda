# ============================================================
# OpenSearch ConfigMap — 3-node cluster configuration
# Dual-purpose: application search + log storage
# ============================================================
apiVersion: v1
kind: ConfigMap
metadata:
  name: opensearch-config
  namespace: hire-adda
  labels:
    app: opensearch
    tier: search
    app.kubernetes.io/name: opensearch
    app.kubernetes.io/component: search
    app.kubernetes.io/part-of: hire-adda
data:
  # Cluster settings (env vars set directly on StatefulSet)
  CLUSTER_NAME: 'hireadda'
  OPENSEARCH_JAVA_OPTS: '-Xms1536m -Xmx1536m'
  DISABLE_SECURITY_PLUGIN: 'true'
  DISABLE_INSTALL_DEMO_CONFIG: 'true'

  # Reference opensearch.yml (can be mounted at /usr/share/opensearch/config/opensearch.yml)
  opensearch.yml: |
    cluster.name: hireadda
    # node.name set via downward API (metadata.name → opensearch-0, opensearch-1, opensearch-2)

    # Paths
    path.data: /usr/share/opensearch/data

    # Network
    network.host: 0.0.0.0
    http.port: 9200
    transport.port: 9300

    # Cluster discovery (3-node)
    discovery.seed_hosts:
      - opensearch-0.opensearch
      - opensearch-1.opensearch
      - opensearch-2.opensearch
    cluster.initial_cluster_manager_nodes:
      - opensearch-0
      - opensearch-1
      - opensearch-2

    # Security (disabled — internal network only, protected by NetworkPolicy)
    plugins.security.disabled: true

    # Performance
    indices.memory.index_buffer_size: 20%
    indices.queries.cache.size: 15%

    # Circuit breakers
    indices.breaker.total.limit: 70%
    indices.breaker.fielddata.limit: 40%
    indices.breaker.request.limit: 60%

    # Thread pools
    thread_pool.write.queue_size: 1000
    thread_pool.search.queue_size: 1000

  # Index lifecycle policy for log indices (auto-delete after 14 days)
  log-index-policy.json: |
    {
      "policy": {
        "description": "Auto-delete log indices after 14 days",
        "default_state": "hot",
        "states": [
          {
            "name": "hot",
            "actions": [],
            "transitions": [
              {
                "state_name": "delete",
                "conditions": {
                  "min_index_age": "14d"
                }
              }
            ]
          },
          {
            "name": "delete",
            "actions": [
              { "delete": {} }
            ],
            "transitions": []
          }
        ],
        "ism_template": [
          {
            "index_patterns": ["logs-hire-adda-*"],
            "priority": 100
          }
        ]
      }
    }
