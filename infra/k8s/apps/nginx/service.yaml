# ============================================================
# Nginx — Service (ClusterIP)
# Internal reverse proxy, matches Docker nginx service
# ============================================================
apiVersion: v1
kind: Service
metadata:
  name: nginx
  namespace: hire-adda
  labels:
    app: nginx
    tier: proxy
    app.kubernetes.io/name: nginx
    app.kubernetes.io/component: proxy
    app.kubernetes.io/part-of: hire-adda
spec:
  type: ClusterIP
  selector:
    app: nginx
  ports:
    - name: http
      port: 80
      targetPort: 80
      protocol: TCP
    - name: metrics
      port: 8080
      targetPort: 8080
      protocol: TCP
