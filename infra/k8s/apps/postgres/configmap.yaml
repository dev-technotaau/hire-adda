# ============================================================
# PostgreSQL ConfigMap — Tuning for 16GB VPS
# Mount as postgresql.conf or use env vars
# ============================================================
apiVersion: v1
kind: ConfigMap
metadata:
  name: postgres-config
  namespace: hire-adda
  labels:
    app: postgres
    tier: database
    app.kubernetes.io/name: postgres
    app.kubernetes.io/component: database
    app.kubernetes.io/part-of: hire-adda
data:
  # Database
  POSTGRES_USER: 'postgres'
  POSTGRES_DB: 'hireadda'
  PGDATA: '/var/lib/postgresql/data/pgdata'
  POSTGRES_INITDB_ARGS: '--encoding=UTF8 --locale=C'

  # Custom PostgreSQL config (can be mounted at /etc/postgresql/postgresql.conf)
  postgresql.conf: |
    # ── Connection Settings ──
    listen_addresses = '*'
    max_connections = 100
    port = 5432

    # ── Memory (tuned for 16GB VPS, ~1GB allocated to PG) ──
    shared_buffers = 256MB
    effective_cache_size = 512MB
    work_mem = 8MB
    maintenance_work_mem = 128MB
    wal_buffers = 16MB

    # ── Write-Ahead Log ──
    wal_level = replica
    max_wal_size = 1GB
    min_wal_size = 80MB
    checkpoint_completion_target = 0.9

    # ── Query Planner ──
    random_page_cost = 1.1
    effective_io_concurrency = 200
    default_statistics_target = 100

    # ── Logging ──
    log_min_duration_statement = 1000
    log_checkpoints = on
    log_connections = off
    log_disconnections = off
    log_lock_waits = on
    log_temp_files = 0
    log_autovacuum_min_duration = 0
    log_line_prefix = '%m [%p] %q%u@%d '

    # ── Autovacuum ──
    autovacuum = on
    autovacuum_max_workers = 2
    autovacuum_naptime = 60

    # ── Locale ──
    lc_messages = 'C'
    lc_monetary = 'C'
    lc_numeric = 'C'
    lc_time = 'C'
