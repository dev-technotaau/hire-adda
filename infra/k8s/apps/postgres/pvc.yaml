# ============================================================
# PostgreSQL — Standalone PVC
# ============================================================
# NOTE: The StatefulSet also defines a volumeClaimTemplate which
# auto-creates a PVC named "postgres-data-postgres-0". This
# standalone PVC is provided as an alternative for manual
# provisioning or pre-migration scenarios.
#
# Use ONE approach:
#   A) volumeClaimTemplates in statefulset.yaml (default, recommended)
#   B) This standalone PVC (delete volumeClaimTemplates from statefulset
#      and add a volumes/volumeMounts reference to this PVC instead)
# ============================================================
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postgres-data
  namespace: talent-bridge
  labels:
    app: postgres
    tier: database
    app.kubernetes.io/name: postgres
    app.kubernetes.io/component: database
    app.kubernetes.io/part-of: talent-bridge
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: local-path
  resources:
    requests:
      storage: 20Gi
