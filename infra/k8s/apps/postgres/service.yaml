# ============================================================
# PostgreSQL — Headless Service (required for StatefulSet)
# ============================================================
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: talent-bridge
  labels:
    app: postgres
    app.kubernetes.io/name: postgres
spec:
  type: ClusterIP
  clusterIP: None
  ports:
    - name: tcp-pg
      port: 5432
      targetPort: 5432
      protocol: TCP
  selector:
    app: postgres
