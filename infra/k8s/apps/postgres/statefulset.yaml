# ============================================================
# PostgreSQL 16 — StatefulSet
# Matches existing docker-compose configuration
# ============================================================
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres
  namespace: talent-bridge
  labels:
    app: postgres
    tier: database
    app.kubernetes.io/name: postgres
    app.kubernetes.io/component: database
    app.kubernetes.io/part-of: talent-bridge
spec:
  serviceName: postgres
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
        tier: database
    spec:
      securityContext:
        runAsUser: 999
        runAsGroup: 999
        fsGroup: 999
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: postgres
          image: postgres:16-alpine
          ports:
            - name: tcp-pg
              containerPort: 5432
              protocol: TCP
          env:
            - name: POSTGRES_USER
              value: 'postgres'
            - name: POSTGRES_DB
              value: 'talentbridge'
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-secrets
                  key: POSTGRES_PASSWORD
            - name: PGDATA
              value: '/var/lib/postgresql/data/pgdata'
            # Performance tuning for 16GB VPS
            - name: POSTGRES_INITDB_ARGS
              value: '--encoding=UTF8 --locale=C'
          args:
            - '-c'
            - 'shared_buffers=256MB'
            - '-c'
            - 'effective_cache_size=512MB'
            - '-c'
            - 'work_mem=8MB'
            - '-c'
            - 'maintenance_work_mem=128MB'
            - '-c'
            - 'max_connections=100'
            - '-c'
            - 'wal_buffers=16MB'
            - '-c'
            - 'log_min_duration_statement=1000'
          resources:
            requests:
              memory: '512Mi'
              cpu: '250m'
            limits:
              memory: '1Gi'
              cpu: '1000m'
          livenessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - postgres
                - -d
                - talentbridge
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 5
          readinessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - postgres
                - -d
                - talentbridge
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
  volumeClaimTemplates:
    - metadata:
        name: postgres-data
        labels:
          app: postgres
      spec:
        accessModes: ['ReadWriteOnce']
        storageClassName: local-path
        resources:
          requests:
            storage: 20Gi
